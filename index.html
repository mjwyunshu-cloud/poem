            DICKINSON: { id: 'p13', name: "狄金森", sub: "内心宇宙的君主", color: PALETTE.yellow, movement: "WANDERER", tags: ["针尖", "丁香", "神迹"], identity: "你在极小的空间里构建了无限国度。你就在终点。", theme: "如果‘我’足够大，斗室是否就能装下宇宙真相？", contract: "你获得了统治永恒的权杖，代价是剪断社交纽带。", habitat: "拉上窗帘的二楼卧室，窗外只有一株丁香。", instinct: "将整个世界浓缩进针尖，在那里统治永恒。", anxiety: "害怕外界对精神秩序的闯入。", shadow: "极致的孤僻让你与现实断裂。", antidote: "试着推开那扇窗。", stats: [30, 92, 90, 35, 65], quote: "假如我不曾见过太阳，我本可以忍受黑暗。", introBooks: [{title: "《孤独是迷人的》", desc: "通向灵魂深处的窄路。"}, {title: "《狄金森诗选》", desc: "感受词语的爆发力。"}] },
            BASHO: { id: 'p14', name: "松尾芭蕉", sub: "草帽下的行路人", color: PALETTE.lavender, movement: "WANDERER", tags: ["草帽", "瞬间", "寂寥"], identity: "你将生命化为旅程。在极简中，捕捉到了万物交叠时的寂寥。", theme: "在不停歇的脚步中，如何剔除‘我’的虚荣回归寂静？", contract: "你获得了点化瞬间的魔力，代价是忍受恒久的孤寂。", habitat: "古池塘旁的一棵残柳。", instinct: "在不停歇的脚步中，过滤掉虚荣的辞藻。", anxiety: "害怕停留带来的僵死感。", shadow: "极致孤独让你无法与人共存。", antidote: "尝试建立一点连接。", stats: [40, 95, 85, 100, 50], quote: "闲寂古池旁，青蛙跳入水声响。", introBooks: [{title: "《奥之细道》", desc: "日本文学史上最美的纪行。"}, {title: "《芭蕉俳句精选》", desc: "捕捉瞬间即永恒的奥秘。"}] },
            WHITMAN: { id: 'p15', name: "惠特曼", sub: "草叶间的歌者", color: PALETTE.yellow, movement: "WANDERER", tags: ["粗犷", "平等", "颂歌"], identity: "你张开双臂拥抱万物。身体和灵魂一样神圣。", theme: "如何在一个等级森严的世界里，通过草叶宣告众生平等？", contract: "你获得了拥抱森林的臂膀，代价是忽视了个人微痛。", habitat: "一望无际的美国中西部大草原。", instinct: "打破格律的枷锁，让生命力像杂草一样野蛮生长。", anxiety: "害怕生命在界限中萎缩。", shadow: "过度的宏大叙事。", antidote: "去凝视一朵小花。", stats: [90, 50, 85, 75, 98], quote: "我赞美我自己，我歌唱我自己。", introBooks: [{title: "《草叶集》", desc: "自由自在的生命赞歌。"}, {title: "《自我之歌》", desc: "对个体主体性的肯定。"}] },
            MARY_OLIVER: { id: 'p16', name: "玛丽·奥利弗", sub: "自然的仰望者", color: PALETTE.green, movement: "WANDERER", tags: ["野鹅", "朝露", "虔诚"], identity: "你觉得自然的本能比人类文明更神圣。林间漫步是你的祈祷。", theme: "如何从嘈杂中‘逃跑’，找回原本动物性的喜悦？", contract: "你获得了自然的入场券，代价是在人群中的格格不入。", habitat: "一片清晨刚苏醒的、充满露水的森林小径。", instinct: "通过对草木与候鸟的赞美，重建对生命的热忱。", anxiety: "害怕精神被嘈杂玷污。", shadow: "过度抽离。", antidote: "在荒野中看见他人的眼。", stats: [70, 50, 85, 100, 65], quote: "你要如何度过你这疯狂而宝贵的一生？", introBooks: [{title: "《诗选》", desc: "找回与万物的初始连接。"}, {title: "《上游》", desc: "阅读、自然与孤独的散文。"}] },
            DU_FU: { id: 'p17', name: "杜甫", sub: "大地的记录者", color: PALETTE.green, movement: "HERO", tags: ["沉郁", "史诗", "风骨"], identity: "你选择把时代的疼痛刻进骨头里。你无法闭上眼。", theme: "在一个支离破碎的时代，诗人如何托举文明尊严？", contract: "你获得了永恒的敬意，代价是终其一生未卸下的忧虑。", habitat: "暴雨前夕，摇摇欲坠但充满温情的草堂。", instinct: "在支离破碎的废墟上，缝补文明的尊严。", anxiety: "害怕道德和道义崩塌。", shadow: "悲悯感过重，很难快乐。", antidote: "允许自己有片刻自私。", stats: [60, 85, 75, 60, 100], quote: "安得广厦千万间，大庇天下寒士俱欢颜。", introBooks: [{title: "《杜工部集》", desc: "中国文学中最具厚度的灵魂档案。"}, {title: "《杜甫评传》", desc: "深入了解沉郁顿挫的生命过程。"}] },
            AKHMATOVA: { id: 'p18', name: "阿赫玛托娃", sub: "冰雪中的尊严", color: PALETTE.blue, movement: "HERO", tags: ["坚韧", "纪念碑", "记忆"], identity: "你在时代的残酷暴政下，守护词语的真理。", theme: "当语言被迫噤声，如何通过精准见证让受难获得尊严？", contract: "你获得了不朽声名，代价是冰雪伫立太久无法回暖。", habitat: "列宁格勒火车站那绝望的月台。", instinct: "在极度的沉默中，用精准的诗行记录受难。", anxiety: "害怕尊严丧失。", shadow: "悲剧色彩过浓。", stats: [55, 80, 92, 50, 100], quote: "我在这里，和我的族人在一起。", introBooks: [{title: "《安魂曲》", desc: "寒冬中写就的尊严杰作。"}, {title: "《白色的群鸟》", desc: "早期诗作中的纯净之光。"}] },
            CELAN: { id: 'p19', name: "策兰", sub: "破碎语言的守夜人", color: PALETTE.blue, movement: "HERO", tags: ["石砾", "呼吸", "洗礼"], identity: "你在阴影下，用几乎断裂的语言记录着不可言说的创伤。", theme: "如何在一片死寂的乱石岗中，寻找一秒钟清澈的呼吸？", contract: "你获得了剥开谎言的毒针，代价是语言走向绝境。", habitat: "塞纳河上的一座孤桥，月光将影子拉得很长。", instinct: "让词语在痛苦中洗礼，变成刺入麻木世俗的针。", anxiety: "害怕沉默吞噬记忆。", shadow: "极度压抑让沟通艰难。", antidote: "接纳一秒钟的遗忘。", stats: [50, 92, 85, 60, 95], quote: "死亡是来自德国的大师。", introBooks: [{title: "《罂粟与记忆》", desc: "寂静边缘的语言尊严。"}, {title: "《紧迫》", desc: "策兰后期的深邃与极简。"}] },
            NERUDA: { id: 'p20', name: "聂鲁达", sub: "太平洋的蓝色意志", color: PALETTE.teal, movement: "HERO", tags: ["蔚蓝", "正义", "澎湃"], identity: "你的情感澎湃如海。从私密的欲望走向广阔的大地。", theme: "如何通过个体的生命能量，去唤醒大陆的自由正义？", contract: "你获得了太平洋的潮汐，代价是陷入政治旋涡。", habitat: "智利黑岛，一间能听到太平洋涛声的书房。", instinct: "无论是情欲还是大海涛声，都能在诗中获得永生。", stats: [80, 70, 95, 85, 95], quote: "我想对你做，春天对樱桃树做的事。", introBooks: [{title: "《漫歌》", desc: "跨越美洲大陆的史诗。"}, {title: "《疑问集》", desc: "晚年充满童心的自然之思。"}] }
        };

        // --- 题目列表 ---
        const QUESTIONS = [
            { id: 1, text: "半夜你在空荡荡的街头，看到一个路灯坏了，正对着大街疯狂地闪烁，你会：", options: [{ text: "觉得这乱闪的节奏很带劲，甚至想跟着灯光跳一支舞", type: "REBEL" }, { text: "停下来盯着它看，琢磨它是哪根线路出了问题", type: "SAGE" }, { text: "觉得灯光闪得特别忧郁，像个在黑暗里挣扎的灵魂", type: "IDEALIST" }, { text: "看一眼就继续赶路，反正天亮了它自然就熄了", type: "WANDERER" }] },
            { id: 2, text: "一个老妇人在街角卖“遗憾”，你身上唯一的钱只够买回一段记忆：", options: [{ text: "买回那次我本该愤怒却沉默的瞬间，这次我要大声喊出来", type: "REBEL" }, { text: "买回那次错失的真相细节，我需要知道那一切是如何发生的", type: "SAGE" }, { text: "买回那段已经消失的初恋，哪怕那只是我脑补出来的幻觉", type: "IDEALIST" }, { text: "不买，遗憾是我旅途的一部分，没有它们我走不到现在", type: "WANDERER" }] },
            { id: 3, text: "你在梦中来到一个禁止语言的国度，官员要求你上交所有的词汇：", options: [{ text: "交出一部分，但私藏几个最锋利的脏词用来随时反击", type: "REBEL" }, { text: "寻找这个禁令背后的逻辑漏洞，寻找不需要语言的代码", type: "SAGE" }, { text: "把最美的词绣在内衣里，贴着心脏保存", type: "IDEALIST" }, { text: "交出全部，看向没有边境的荒野", type: "WANDERER" }] },
            { id: 4, text: "如果你能拥有一种诅咒人的力量，你最想让你的敌人：", options: [{ text: "永远无法再说谎，只能赤裸裸地面对真相带来的羞辱", type: "REBEL" }, { text: "逻辑永远混乱，再也无法通过理性去掌控任何局面", type: "SAGE" }, { text: "审美永远枯竭，只能住在极度丑陋且庸俗的环境里", type: "IDEALIST" }, { text: "丧失所有自尊，彻底变成一个随波逐流的工具", type: "HERO" }] },
            { id: 5, text: "你发现了一面镜子，它不照你的脸，只照你的“精神负荷”：", options: [{ text: "盯着镜子里的重压，感到一种想彻底摧毁一切的快意", type: "REBEL" }, { text: "分析负荷的成分，看看哪些是可以被剔除的冗余", type: "SAGE" }, { text: "觉得镜子里那种压抑的光影异常凄美，想把它写成诗", type: "IDEALIST" }, { text: "看一眼就走，负荷再重也是我一个人的路", type: "WANDERER" }] },
            { id: 6, text: "在一场华丽的晚宴上，大家都在谈论名利，你：", options: [{ text: "当场摔碎杯子，让他们闭上那张散发着恶臭的嘴", type: "REBEL" }, { text: "一个人去露台吹风，观察星空那种不需要观众的诚实", type: "WANDERER" }, { text: "在心里构思一首讽刺诗，把这群人解构成一个个滑稽的符号", type: "SAGE" }, { text: "觉得这种嘈杂也是某种‘人世’的温暖，虽然无趣但很真实", type: "HERO" }] },
            { id: 7, text: "如果你的一生是一首诗，你希望它是：", options: [{ text: "一团燃烧的火，读完后满地灰烬", type: "REBEL" }, { text: "一张精密的蓝图，指示所有可能的危险和出口", type: "SAGE" }, { text: "一封寄往远方、从未被人开启过的旧信", type: "IDEALIST" }, { text: "一行写在水面上的字，随波逐流且无迹可寻", type: "WANDERER" }] },
            { id: 8, text: "面对汹涌且盲从的人群：", options: [{ text: "逆流而上，寻找那个最初制造动静的源头", type: "REBEL" }, { text: "站在高处，俯瞰这种群体行为背后的心理模型", type: "SAGE" }, { text: "在人群中寻找一张美丽的、独立的脸", type: "IDEALIST" }, { text: "隐入阴影，去寻找另一条寂静的、没人的小径", type: "WANDERER" }] },
            { id: 9, text: "如果你不得不放弃所有的记忆，只保留一个瞬间：", options: [{ text: "我第一次对权威说“不”的瞬间", type: "REBEL" }, { text: "我第一次看清万物运行规律的瞬间", type: "SAGE" }, { text: "我爱上那个注定会离开的人的瞬间", type: "IDEALIST" }, { text: "我一个人在大地尽头看日落的瞬间", type: "WANDERER" }] },
            { id: 10, text: "当你老了，你最希望：", options: [{ text: "我还是那个没被驯服的野兽", type: "REBEL" }, { text: "我看清了所有的游戏规则", type: "SAGE" }, { text: "我依然能被一个眼神击碎", type: "IDEALIST" }, { text: "我已经走到了大海的尽头", type: "WANDERER" }] },
            { id: 11, text: "在河边看到一个溺水的人，但救他意味着你会错过此生唯一的灵感：", options: [{ text: "直接跳下去救人，诗以后再写", type: "HERO" }, { text: "记录下这一幕的残酷，作为人类生存的注脚", type: "SAGE" }, { text: "感到极度的幻灭，然后转身离开", type: "REBEL" }, { text: "为这种不可挽回的生命消失写一首挽歌", type: "IDEALIST" }] },
            { id: 12, text: "你在旧书摊发现了一本没有名字的诗集：", options: [{ text: "它是这个世界的孤儿，我必须收留它", type: "IDEALIST" }, { text: "研究它所使用的古老词汇，寻找文明的线索", type: "SAGE" }, { text: "觉得它很幸运，终于摆脱了作者的署名", type: "WANDERER" }, { text: "直接在封面上写下自己的名字", type: "REBEL" }] },
            { id: 13, text: "你如何评价“死亡”：", options: [{ text: "它是最公平的句号，终结了所有荒唐", type: "REBEL" }, { text: "它是自然界最完美的平衡点", type: "SAGE" }, { text: "它是给生者最后的一件艺术品", type: "IDEALIST" }, { text: "它只是一次终点到起点的长途旅行", type: "WANDERER" }] },
            { id: 14, text: "如果你的声音能被全世界听到三秒钟：", options: [{ text: "“醒醒吧！”", type: "REBEL" }, { text: "“看看天空。”", type: "IDEALIST" }, { text: "“保持怀疑。”", type: "SAGE" }, { text: "“你是自由的。”", type: "WANDERER" }] },
            { id: 15, text: "面对神灵的沉默，你会：", options: [{ text: "拔剑！既然你不给指示，那我就挑战你", type: "HERO" }, { text: "笑死，神不就是人类逻辑的苍白投射吗？", type: "REBEL" }, { text: "转身走入沙漠，在那儿神管不到我", type: "WANDERER" }, { text: "闭上眼，给自己编个神圣的瞬间", type: "IDEALIST" }] },
            { id: 16, text: "必须要给生命贴上‘出厂标签’，你会勾选哪些项？（多选）", isMulti: true, options: [{ text: "不合时宜的愤怒", type: "REBEL" }, { text: "无可救药的浪漫", type: "IDEALIST" }, { text: "绝对清醒的旁观", type: "SAGE" }, { text: "永无止境的寻找", type: "WANDERER" }, { text: "不值一钱的悲悯", type: "HERO" }] },
            { id: 17, text: "有人递给你一杯‘忘忧水’，喝了能抹掉这辈子最疼的那段记忆，但以后写不出深刻的句子了，你会：", options: [{ text: "不喝，那种疼是我身体的一部分，是我唯一的墨水", type: "REBEL" }, { text: "犹豫地推开，比起快乐，我更怕变得空洞和平庸", type: "IDEALIST" }, { text: "研究这水的成分，看看能不能只抹掉疼而不伤灵魂", type: "SAGE" }, { text: "喝掉它，我只想做一个没心没肺的普通快活人", type: "WANDERER" }] },
            { text: "文学里的“风景”你最想要什么样的？", options: [{ text: "荆棘满地的角斗场，我就喜欢这种对抗感", type: "HERO" }, { text: "几何形状的森林，每棵树都藏着逻辑线索", type: "SAGE" }, { text: "江南的烟雨，是我对抗现实的防空洞", type: "IDEALIST" }, { text: "翻滚的大海，一直喊我去流浪", type: "WANDERER" }] },
            { text: "故事里出现了三页纸的“沉默”。你觉得这代表：", options: [{ text: "加密的电报，肯定有秘密，我得把它解开", type: "SAGE" }, { text: "英雄临死前的绝唱，说不出的压抑", type: "HERO" }, { text: "反抗前的火药味，这种沉默最让敌人害怕", type: "REBEL" }, { text: "太美了，美到用语言说出来都是种亵渎", type: "IDEALIST" }] },
            { text: "“神秘主义”在你看来意味着什么？", options: [{ text: "审美的温床，解释清了，美也就没意思了", type: "IDEALIST" }, { text: "理性的边疆，总有一天我会算出它的公式", type: "SAGE" }, { text: "真理的掩体，我要用怀疑把它逼出来", type: "REBEL" }, { text: "远方的地平线，我一直追，但没打算追上", type: "WANDERER" }] },
            { id: 21, text: "你发现一扇永远关不上的门，风一直往心里灌。这扇门代表你一个无法弥补的遗憾，你会：", options: [{ text: "在门口筑起一道高墙，把它彻底封死在黑暗里", type: "REBEL" }, { text: "搬个板凳坐在门口，静静地听风传来的那个遗憾的回响", type: "IDEALIST" }, { text: "研究风向和气压，试图通过逻辑解释这个遗憾的必然性", type: "SAGE" }, { text: "把这当成家里的一部分，开着门继续生活，让风吹着", type: "WANDERER" }] },
            { text: "如果文字会流血：", options: [{ text: "我会写满一地鲜红，给这世界看", type: "REBEL" }, { text: "我会研究血的流向和凝固的时间", type: "SAGE" }, { text: "我会觉得这种红极度凄艳，适合志哀", type: "IDEALIST" }, { text: "我会放下笔，不再忍心写下去", type: "HERO" }] },
            { text: "如果你发现自己的一生只是别人笔下的一首诗：", options: [{ text: "我会夺过那支笔，自己把结局改了", type: "REBEL" }, { text: "我会感激这个作者，把我的痛苦写得这么准", type: "IDEALIST" }, { text: "我会研究这种元叙事的逻辑漏洞", type: "SAGE" }, { text: "我会静静地等待全诗终结的那一刻", type: "WANDERER" }] },
            { text: "最后，如果你可以变成一件圣器：", options: [{ text: "一把剖开伪善的快刀", type: "REBEL" }, { text: "一架看清星体运行的望远镜", type: "SAGE" }, { text: "一个装满晚霞的墨水瓶", type: "IDEALIST" }, { text: "一张永远折叠不完的旧地图", type: "WANDERER" }] },
            { text: "深夜你被一阵雷声惊醒：", options: [{ text: "对他大喊：再响一点，还没吵够吗？", type: "REBEL" }, { text: "计算雷声到窗边的距离，然后继续睡", type: "SAGE" }, { text: "觉得那是上天对世间不幸的控诉", type: "IDEALIST" }, { text: "披上外衣，去看看谁家的屋顶漏了雨", type: "HERO" }] },
            { text: "如果时间是一张纸，你会怎么涂：", options: [{ text: "画满向后的箭头，编一张精密的逻辑网", type: "SAGE" }, { text: "刻几道深见骨头的印子，那是对抗的疤", type: "HERO" }, { text: "随便乱画，让线条自己随风去空白处", type: "WANDERER" }, { text: "一层又一层地涂彩墨，整出个虚幻厚度", type: "IDEALIST" }] },
            { text: "如果你知道明天你就会消失，今晚你会：", options: [{ text: "烧掉所有的笔记，什么也不留给这世界", type: "REBEL" }, { text: "静坐，观察呼吸停止的每一个微小步骤", type: "SAGE" }, { text: "和最爱的人跳一支舞，直到天亮", type: "IDEALIST" }, { text: "一个人去海边，等待那个瞬间", type: "WANDERER" }] },
            { text: "你理想中的伴侣是：", options: [{ text: "能陪我一起推翻世界的人", type: "REBEL" }, { text: "能读懂我所有代码的人", type: "SAGE" }, { text: "像晚霞一样绝美的人", type: "IDEALIST" }, { text: "能和我并肩走在荒野上的人", type: "WANDERER" }, { text: "我就是我自己的唯一伴侣", type: "SAGE" }] },
            { text: "当你走进一个废弃的房间，你第一眼看见的是：", options: [{ text: "墙上的裂缝，它像一个出口", type: "REBEL" }, { text: "积满灰尘的钟表，它停在某个真相时刻", type: "SAGE" }, { text: "破窗帘后面漏进来的一抹月光", type: "IDEALIST" }, { text: "门口那双被踢乱的、走向远方的鞋", type: "WANDERER" }] },
            { text: "最后，如果世界只剩最后一滴墨水，你会：", options: [{ text: "写一个“不”字，哪怕没人看见", type: "REBEL" }, { text: "写下一个关于宇宙起源的公式", type: "SAGE" }, { text: "画一朵正在盛开也正在凋零的花", type: "IDEALIST" }, { text: "在手心画一个指南针，然后出发", type: "WANDERER" }] }
        ];

        // --- 核心组件 ---
        const TendencyBar = ({ label, left, right, value }) => (
            <div className="w-full space-y-2">
                <div className="flex justify-between text-[8px] font-bold uppercase opacity-30 tracking-[0.2em] font-sans">
                    <span>{left}</span><span>{label}</span><span>{right}</span>
                </div>
                <div className="h-[1px] w-full bg-[#dcd8cf] relative">
                    <div className="h-2.5 w-2.5 rounded-full bg-white border border-[#3a3833] absolute top-1/2 -translate-y-1/2 shadow-sm transition-all duration-1000" 
                         style={{ left: `${value}%`, transform: 'translate(-50%, -50%)' }}></div>
                </div>
            </div>
        );

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQ, setCurrentQ] = useState(0);
            const [scores, setScores] = useState({ REBEL: 0, SAGE: 0, IDEALIST: 0, WANDERER: 0, HERO: 0 });
            const [history, setHistory] = useState([]);
            const [selectedMulti, setSelectedMulti] = useState([]);
            const [result, setResult] = useState(null);
            const [labOpen, setLabOpen] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [refId] = useState(() => Math.random().toString(36).substr(2, 6).toUpperCase());

            const radarRef = useRef(null);
            const captureRef = useRef(null);

            const handleAnswer = (type, index) => {
                const nextScores = { ...scores, [type]: scores[type] + 1 };
                const currentHistory = [...history, { scores, currentQ, choiceIndex: index }];
                setHistory(currentHistory);
                setScores(nextScores);
                if (currentQ < QUESTIONS.length - 1) { setCurrentQ(currentQ + 1); window.scrollTo(0, 0); }
                else finalizeResult(nextScores, currentHistory);
            };

            const handleMultiSelect = (type) => {
                if (selectedMulti.includes(type)) setSelectedMulti(selectedMulti.filter(t => t !== type));
                else setSelectedMulti([...selectedMulti, type]);
            };

            const handleConfirmMulti = () => {
                if (selectedMulti.length === 0) return;
                const nextScores = { ...scores };
                selectedMulti.forEach(type => { nextScores[type] += 1; });
                setScores(nextScores);
                const currentHistory = [...history, { scores, currentQ, choiceIndex: 0 }];
                setHistory(currentHistory);
                setSelectedMulti([]); 
                if (currentQ < QUESTIONS.length - 1) { setCurrentQ(currentQ + 1); window.scrollTo(0, 0); }
                else finalizeResult(nextScores, currentHistory);
            };

            const finalizeResult = (finalScores, fullHistory) => {
                const top = Object.keys(finalScores).sort().reduce((a, b) => finalScores[a] > finalScores[b] ? a : b);
                const pool = Object.values(POETS).filter(p => p.movement === top).sort((a,b) => a.id.localeCompare(b.id));
                const seed = fullHistory.reduce((sum, h) => sum + (h.choiceIndex || 0), 0);
                const finalPoet = pool[seed % pool.length] || POETS.LI_BAI;
                setResult(finalPoet);
                setStep('result');
                window.scrollTo(0, 0);
            };

            useEffect(() => {
                if (step === 'result' && result && radarRef.current) {
                    const ctx = radarRef.current.getContext('2d');
                    if (window.Chart) {
                        new window.Chart(ctx, {
                            type: 'radar',
                            data: {
                                labels: ['反叛', '智性', '审美', '自由', '意志'],
                                datasets: [{ data: result.stats, backgroundColor: `${result.color}15`, borderColor: result.color, borderWidth: 1, pointRadius: 1 }]
                            },
                            options: { scales: { r: { grid: { color: 'rgba(0,0,0,0.03)' }, angleLines: { display: false }, ticks: { display: false }, min: 0, max: 100 } }, plugins: { legend: { display: false } }, maintainAspectRatio: false }
                        });
                    }
                }
            }, [step, result]);

            const saveReport = async () => {
                if (!window.html2canvas) return;
                setIsSaving(true);
                try {
                    const canvas = await window.html2canvas(captureRef.current, { scale: 2.5, backgroundColor: PALETTE.bg, useCORS: true });
                    const link = document.createElement('a'); link.download = `POET_REPORT_${result.name}.png`;
                    link.href = canvas.toDataURL('image/png'); link.click();
                } catch (e) { console.error(e); }
                setIsSaving(false);
            };

            return (
                <div className="safe-container">
                    <div className="w-full max-w-[520px] relative">
                        {/* 1. 欢迎页 */}
                        {step === 'welcome' && (
                            <div className="animate-fade-in bg-[#fcfbf9] border border-[#dcd8cf] p-10 md:p-14 text-center shadow-xl relative overflow-hidden">
                                <div className="deckled-top"></div>
                                <div className="absolute top-0 left-0 w-full h-1/2 opacity-10 pointer-events-none">
                                    <div className="h-1/2 w-full" style={{ backgroundColor: PALETTE.green }}></div>
                                    <div className="h-1/4 w-full" style={{ backgroundColor: PALETTE.blue }}></div>
                                    <div className="h-1/4 w-full" style={{ backgroundColor: PALETTE.teal }}></div>
                                </div>
                                <div className="relative z-10 flex flex-col items-center py-12">
                                    <div className="w-28 h-28 rounded-full shadow-2xl flex items-center justify-center bg-white/40 mb-12" style={{ backgroundColor: PALETTE.yellow }}></div>
                                    <h1 className="text-[2.6rem] md:text-[3.2rem] font-light tracking-[0.4em] leading-tight text-[#3a3833]">诗人的回响</h1>
                                </div>
                                <button onClick={() => setStep('quiz')} className="relative z-10 px-12 py-4 border border-[#3a3833] text-[10px] tracking-[0.6em] font-bold uppercase transition-all hover:bg-black hover:text-white">开启测试 / START</button>
                                <div className="absolute bottom-6 left-0 w-full text-[7px] opacity-20 tracking-widest font-sans font-bold">POSÉRIAL SPIRITUAL EXPERIMENT 2026</div>
                            </div>
                        )}

                        {/* 2. 测试页 */}
                        {step === 'quiz' && (
                            <div className="animate-fade-in space-y-12">
                                <div className="flex justify-between items-end px-4 border-b border-[#3a3833] pb-4">
                                    <button onClick={() => currentQ > 0 ? setCurrentQ(currentQ-1) : setStep('welcome')} className="text-[9px] font-bold opacity-40 uppercase tracking-widest">← Back</button>
                                    <span className="text-[10px] tracking-[0.5em] font-bold uppercase font-sans text-[#3a3833]">Manuscript {currentQ + 1} / 30</span>
                                    <div className="h-1 w-20 bg-[#dcd8cf] relative"><div className="h-full bg-[#d45a43] transition-all duration-500" style={{ width: `${((currentQ+1)/30)*100}%` }}></div></div>
                                </div>
                                <div className="min-h-[140px] flex items-center justify-center px-6 text-xl md:text-2xl font-bold leading-relaxed text-center tracking-wide text-[#3a3833]">{QUESTIONS[currentQ].text}</div>
                                <div className="grid gap-4 px-4 pb-12">
                                    {QUESTIONS[currentQ].options.map((opt, i) => (
                                        <button key={i} onClick={() => QUESTIONS[currentQ].isMulti ? handleMultiSelect(opt.type) : handleAnswer(opt.type, i)}
                                            className={`w-full p-6 text-sm border transition-all text-left group ${QUESTIONS[currentQ].isMulti && selectedMulti.includes(opt.type) ? 'border-[#d45a43] bg-[#d45a43]/5' : 'border-[#dcd8cf] bg-white/60 hover:border-[#3a3833]'}`}>
                                            <span className={`group-hover:translate-x-2 transition-transform inline-block ${QUESTIONS[currentQ].isMulti && selectedMulti.includes(opt.type) ? 'opacity-100 font-bold' : 'opacity-70'}`}>{opt.text} {QUESTIONS[currentQ].isMulti && selectedMulti.includes(opt.type) && '✓'}</span>
                                        </button>
                                    ))}
                                    {QUESTIONS[currentQ].isMulti && <button onClick={handleConfirmMulti} className="mt-4 w-full py-4 bg-[#3a3833] text-white text-xs font-bold uppercase tracking-widest font-sans">确认选择 / CONFIRM</button>}
                                </div>
                            </div>
                        )}

                        {/* 3. 结果页 */}
                        {step === 'result' && result && (
                            <div className="animate-fade-in space-y-12 pb-20">
                                <div ref={captureRef} className="bg-[#f4f1ea] px-2 py-4">
                                    <div className="bg-[#fcfbf9] border border-[#dcd8cf] p-8 md:p-12 space-y-12 relative overflow-hidden shadow-xl">
                                        <div className="deckled-top"></div>
                                        <div className="ink-stamp absolute top-10 right-8 font-sans">Archived</div>
                                        
                                        <div className="flex flex-col items-center space-y-4 pt-6">
                                            <div className="w-16 h-[2px]" style={{ backgroundColor: result.color }}></div>
                                            <div className="flex items-center gap-4">
                                                <span className="text-[10px] font-bold uppercase tracking-[0.3em] text-[#d45a43] border border-[#d45a43] px-2 py-0.5 font-sans">Archetype</span>
                                                <span className="text-[10px] font-mono opacity-20 tracking-tighter font-sans text-stone-400">REF-#{refId}</span>
                                            </div>
                                            <h2 className="text-4xl md:text-5xl font-bold tracking-tight text-center text-[#3a3833]">{result.name}</h2>
                                            <div className="flex gap-2 justify-center opacity-40">
                                                {result.tags.map(t => <span key={t} className="text-[9px] font-bold tracking-widest border border-black/20 px-2 py-0.5 uppercase text-[#3a3833]">#{t}</span>)}
                                            </div>
                                        </div>

                                        <div className="w-full py-12 border-y border-[#dcd8cf] text-center bg-[#fffcf5] text-2xl font-bold px-8 italic leading-relaxed font-serif text-[#3a3833]">“{result.quote}”</div>

                                        <div className="grid grid-cols-1 md:grid-cols-[1.3fr_1fr] gap-10">
                                            <div className="space-y-8">
                                                <div className="space-y-4 flex">
                                                    <div className="vertical-rl font-sans text-[10px] font-bold tracking-[0.4em] text-[#d45a43] pt-1">THE SELF / 灵魂本色</div>
                                                    <div className="flex-1 space-y-4">
                                                        <p className="text-xl font-bold leading-relaxed tracking-wide text-justify text-[#3a3833]">{result.identity}</p>
                                                        <p className="text-xs leading-loose opacity-60 text-justify italic border-l border-[#dcd8cf] pl-4 text-[#3a3833]">{result.longDesc}</p>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-center justify-center p-4 bg-white/40 border border-[#dcd8cf]">
                                                <span className="text-[9px] font-bold opacity-30 mb-4 uppercase tracking-[0.2em] font-sans text-[#3a3833]">Analysis</span>
                                                <div className="w-40 h-40 opacity-90"><canvas ref={radarRef}></canvas></div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 border-t border-[#dcd8cf]/30 pt-10 text-[#3a3833]">
                                            <div className="space-y-3 bg-[#fffcf5] p-6 border border-[#dcd8cf]/30 shadow-sm">
                                                <span className="text-[10px] font-bold text-[#d45a43] uppercase tracking-[0.3em] font-sans">Theme / 叙事母题</span>
                                                <p className="text-[13px] leading-relaxed font-bold italic opacity-80">{result.theme}</p>
                                            </div>
                                            <div className="space-y-3 bg-[#fffcf5] p-6 border border-[#dcd8cf]/30 shadow-sm">
                                                <span className="text-[10px] font-bold text-[#d45a43] uppercase tracking-[0.3em] font-sans">Contract / 灵魂契约</span>
                                                <p className="text-[13px] leading-relaxed font-bold italic opacity-80">{result.contract}</p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8 border-t border-[#dcd8cf]/30 pt-10 text-[#3a3833]">
                                            <TendencyBar label="灵性 vs 现实" left="Spirit" right="Reality" value={result.stats[0]} />
                                            <TendencyBar label="解构 vs 构建" left="Decon" right="Build" value={result.stats[1]} />
                                            <TendencyBar label="出世 vs 入世" left="Zen" right="People" value={result.stats[3]} />
                                            <div className="flex items-center gap-4">
                                                <div className="h-full w-1 bg-[#d45a43]"></div>
                                                <div><p className="text-[9px] font-bold uppercase opacity-30 tracking-widest font-sans">Movement</p><p className="text-sm font-bold">{MOVEMENTS[result.movement].name.split('/')[0]}</p></div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-[#3a3833]">
                                            <div className="space-y-3 bg-[#fcfbf9] p-5 border border-[#dcd8cf]/30">
                                                <span className="text-[10px] font-bold text-[#d45a43] uppercase tracking-[0.3em] font-sans">Habit / 栖息地</span>
                                                <p className="text-[13px] leading-relaxed opacity-80 italic font-medium">{result.habitat}</p>
                                            </div>
                                            <div className="space-y-3 bg-[#fcfbf9] p-5 border border-[#dcd8cf]/30">
                                                <span className="text-[10px] font-bold text-[#d45a43] uppercase tracking-[0.3em] font-sans">Instinct / 本能</span>
                                                <p className="text-[13px] leading-relaxed opacity-80 italic font-medium">{result.instinct}</p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-0 border border-[#d45a43]/40 divide-y md:divide-y-0 md:divide-x divide-[#d45a43]/20 bg-[#fffcf5]/30 text-[#3a3833]">
                                            <div className="p-6 text-center"><span className="text-[9px] font-bold opacity-40 uppercase tracking-widest block mb-2 font-sans">Anxiety</span><p className="text-xs italic leading-relaxed">{result.anxiety}</p></div>
                                            <div className="p-6 text-center"><span className="text-[9px] font-bold opacity-40 uppercase tracking-widest block mb-2 font-sans">Shadow</span><p className="text-xs italic leading-relaxed">{result.shadow}</p></div>
                                            <div className="p-6 bg-[#d45a43]/5 flex flex-col justify-center items-center text-center"><span className="text-[9px] font-bold text-[#d45a43] uppercase mb-2 font-sans">Antidote</span><p className="text-sm font-bold tracking-widest italic text-[#3a3833]">“{result.antidote}”</p></div>
                                        </div>

                                        <div className="space-y-6 pt-10 border-t border-[#dcd8cf] text-[#3a3833]">
                                            <h4 className="text-[10px] font-bold tracking-[0.6em] text-center uppercase opacity-40 font-sans">Recommended Reading / 必读双书</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {result.introBooks.map(b => (
                                                    <div key={b.title} className="p-5 bg-white border border-[#dcd8cf] space-y-3 transition-all hover:border-[#d45a43] group shadow-sm text-left">
                                                        <h5 className="font-bold text-base leading-tight group-hover:text-[#d45a43] transition-colors">{b.title}</h5>
                                                        <p className="text-[10px] opacity-40 italic">{b.desc}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="w-full h-8 flex mt-4 opacity-50">{[PALETTE.green, PALETTE.blue, PALETTE.teal, PALETTE.lavender, PALETTE.yellow].map(c => <div key={c} className="flex-1" style={{ backgroundColor: c }}></div>)}</div>
                                        <div className="text-[8px] opacity-20 tracking-[0.6em] text-center font-bold uppercase font-sans text-[#3a3833]">Posérial Spiritual Experiment 2026</div>
                                    </div>
                                </div>
                                <div className="px-8 space-y-4 pb-12">
                                    <button onClick={saveReport} disabled={isSaving} className="w-full py-5 bg-[#3a3833] text-[#f4f1ea] text-xs tracking-[0.6em] font-bold shadow-xl uppercase transition-all hover:bg-black disabled:opacity-50 font-sans">{isSaving ? "GENERATING..." : "保存灵魂手稿报告"}</button>
                                    <button onClick={() => window.location.reload()} className="w-full py-4 border-2 border-[#3a3833] text-[10px] tracking-[0.5em] font-bold uppercase transition-all hover:bg-[#3a3833] hover:text-white font-sans">重新测试 / RETRY</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
