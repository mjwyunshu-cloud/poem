    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PALETTE = {
            green: "#898b2c", blue: "#1b75bb", teal: "#3bb3b2",
            yellow: "#f9ed8c", lavender: "#7a9ad1", paper: "#fcfbf9",
            text: "#3a3833", accent: "#d45a43"
        };

        const MOVEMENTS = {
            REBEL: { name: "反叛者 / REBEL" },
            SAGE: { name: "观察者 / SAGE" },
            IDEALIST: { name: "审美者 / IDEALIST" },
            WANDERER: { name: "漫游者 / WANDERER" },
            HERO: { name: "见证人 / HERO" }
        };

        const POETS = {
            LI_BAI: { name: "李白", sub: "拒绝落地的谪仙", color: PALETTE.green, movement: "REBEL", identity: "你觉得现实生活太沉了，总想通过某种极致的飞翔摆脱引力。在你眼里，规则是为凡人准备的。你通过幻觉与狂想，单方面取消了世界对你的征税。这种精神上的绝对主权，让你拥有一种‘天外来客’的疏离感。", longDesc: "你是浪漫主义的终极样本。你不需要通过适应来生存，你通过创造一个更辽阔的宇宙来覆盖现实。你的文字不是在描写风景，而是在发布一种关于自由的命令。这种拒绝妥协的姿态，保全了灵魂最原始的纯度。", stats: [98, 40, 85, 90, 60], quote: "仰天大笑出门去，我辈岂是蓬蒿人。", anxiety: "害怕灵魂的平庸化与现实的引力。你无法忍受那种一眼望到头的、被秩序填满的生活。", shadow: "过度的狂傲往往是为了掩饰对深层孤独的恐惧。当飞翔停止，你必须面对地面上的尘埃。", antidote: "去泥土里扎一次根，感受那些卑微但真实的重量。", introBooks: [{title: "《李太白全集》", desc: "看一个灵魂如何通过文字拒绝任何形式的下坠与妥协。"}, {title: "《李白传》", desc: "理解那狂傲表象下的血肉之躯，以及他在盛唐与碎影间的挣扎。"}] },
            DU_FU: { name: "杜甫", sub: "大地的记录者", color: PALETTE.green, movement: "HERO", identity: "你选择把时代的疼痛刻进骨头里。你无法闭上眼假装没看见那些褶皱。你的人格核心是一种沉重的‘共情力’。当你看到他人的苦难，你的灵魂会自动进行等价交换，将那些冰冷记录在词句中。", longDesc: "你是文明的最后一道防线。在支离破碎的时代，你用纸笔缝补着人类的尊严。每一声叹息都承载着一个文明的重量，这种沉重感虽让你一生无欢，但却让你成为了历史最忠实的证人。", stats: [60, 85, 75, 60, 100], quote: "安得广厦千万间，大庇天下寒士俱欢颜。", anxiety: "道德感与责任感的过度背负。你总觉得如果这个世界还有一个人在受苦，你就没有资格完全快乐。", shadow: "悲悯感过重会导致精神的长期过载。你太容易被外界的悲剧吞噬，而忽略了自我的建设。", antidote: "允许自己有片刻的自私。在关怀众生之前，先给自己的灵魂一处避雨的草堂。", introBooks: [{title: "《杜工部集》", desc: "中国文学中最具道德厚度的灵魂档案。记录了一个普通人在苦难中如何坚守尊严。"}, {title: "《杜甫评传》", desc: "深入了解沉郁顿挫背后的生命逻辑，以及他在动荡中如何保持清醒。"}] },
            SZYMBORSKA: { name: "辛波斯卡", sub: "万物的惊奇者", color: PALETTE.yellow, movement: "SAGE", identity: "你用一种轻微的讽刺和巨大的耐心观察生活。你觉得‘不知道’才是最迷人的词。你拒绝那种宏大的、充满攻击性的真理，转而在剥洋葱、看尘埃的过程中，寻找一种极其坚固的生存逻辑。", longDesc: "你是智性的观察家。你用平易的词汇解构宏大叙事，在平庸琐碎的日常中挖掘奇迹。你对世界的‘惊奇感’来源于你始终保持的局外人姿态，你深知历史冷酷，因此选择用清醒的善意呵护具体的瞬间。", stats: [50, 85, 90, 95, 60], quote: "我看待万物，仿佛它们刚诞生。", anxiety: "害怕感知力的麻木。你最恐惧的是对这个世界习以为常，从而失去那份发现‘未知’的本能。", shadow: "过度的抽离和局外人姿态，有时会让你显得过于冷漠。你观察着世界的苦难，却极少亲身介入其中。", antidote: "投入一次盲目的、不计后果的热忱。去经历那种无法被智性解构的真实混乱。", introBooks: [{title: "《万物静默如谜》", desc: "感受那种清醒的、温和的惊奇感。理解她如何用一粒沙对抗整座历史纪念碑。"}, {title: "《这里》", desc: "晚年对微小事物的哲思凝视。那是智性与温柔在生命最后阶段达成的完美契约。"}] },
            RIMBAUD: { name: "兰波", sub: "荒野的通灵少年", color: PALETTE.blue, movement: "REBEL", identity: "你讨厌一切陈词滥调。你试图捣碎语言，寻找带刺的真实。你坚信只有通过有意识的感官错乱，才能穿透现实的幕布。你是一个自愿坠入地狱的探索者，只为在那里偷窃上帝拒绝分享的火种。", longDesc: "你是语言的爆破工。你追求的是绝对的真实，这种追求让你极度早慧且暴躁。你提前透支了所有才华，只为在青春的刹那完成对世界的总清算。虽然最终走向沉默，但你留下的字节永带灼伤。", stats: [100, 65, 80, 95, 45], quote: "我成了我自己的灵魂的偷窃者。", anxiety: "害怕感官的钝化。你无法接受肉体和精神在平庸的安稳中逐渐腐坏和消亡。", shadow: "由于透支而导致的灵魂枯竭。你的反叛往往建立在对自我的过度损耗之上，容易导致精神的早谢。", antidote: "试着接纳一点点安稳。理解规律不是为了限制你，而是为了让你能飞得更久一些。", introBooks: [{title: "《彩画集》", desc: "破碎中见真章。理解语言是如何在幻觉与通灵中被重构成全新的生命载体。"}, {title: "《兰波全集》", desc: "通向天才与地狱的阶梯。看一个反叛者如何从火焰走向最后的沉默。"}] },
            TS_ELIOT: { name: "T.S.艾略特", sub: "文明的诊断医师", color: PALETTE.blue, movement: "SAGE", identity: "你站在精神的废墟上，冷静地给现代文明下诊断书。你迷恋那些有秩序的、古老的符号。你觉得当代人的灵魂是空心的，在荒原上随风而行。你的思考带有严谨的逻辑，试图在崩塌中找回基石。", longDesc: "你是文明的守望者。你在历史的碎片中寻找接续可能，试图用智性对抗这个已经脱轨的世界。你拒绝廉价的抒情，转而追求克制的、有结构的表达。这种智性高姿态让你拥有了混乱中保持清醒的特权。", stats: [45, 98, 60, 55, 85], quote: "四月是最残忍的季节。", anxiety: "精神的彻底碎片化与意义的丧失。你在秩序的废墟中不断确认‘空虚’这一事实。", shadow: "知识的重负有时会扼杀直接的生命冲动。你太懂规则和传统了，以至于失去了像孩子一样去触碰世界的能力。", antidote: "在理性的裂缝里种下一朵感性的小花。允许自己在没有逻辑支撑的情况下，纯粹地流一次泪。", introBooks: [{title: "《荒原》", desc: "现代主义诗歌的开山之作。看智性如何剖开文明的伤口，寻找最后一点救赎的可能。"}, {title: "《四个四重奏》", desc: "关于时间的终极冥想。那是理性的尽头与信仰开始处的交响。建议在深夜静读。"}] },
            DICKINSON: { name: "狄金森", sub: "内心宇宙的君主", color: PALETTE.yellow, movement: "WANDERER", identity: "你在极小的空间里构建了无限的国度。你不需要远行，因为你就在终点。你的一生都在试图捕捉那些微小到不可察觉的神迹：一株丁香的凋零、一缕阳光的折射。你对灵魂深处的洞察让物理世界显得贫瘠。", longDesc: "你是精神的独居者。你用跳跃的、破折号般的语言记录着内心宇宙的爆炸与重启。你不需要观众，因为你已经独立统治了一个永恒的国度。这种极致的纯粹，让你成为了文学史上从未黯淡过的超新星。", stats: [30, 92, 90, 35, 65], quote: "假如我不曾见过太阳，我本可以忍受黑暗。", anxiety: "外界对精神秩序的闯入。你对‘陌生’和‘被打扰’有着近乎病态的敏感。", shadow: "极端的孤僻会导致与现实生活的彻底断裂。你统治着无限的王国，却在面对一个具体的生人时感到手足无措。", antidote: "试着推开那扇尘封已久的窗。去闻一闻窗外那些真实、杂乱且带着泥土气息的风。", introBooks: [{title: "《孤独是迷人的》", desc: "通向灵魂深处的窄路。理解为什么一间斗室可以比整个宇宙还要辽阔和深刻。"}, {title: "《狄金森诗选》", desc: "感受词语在紧凑结构中爆发出的生命力。每一句诗都是一次微型的心灵爆炸。"}] },
            PLATH: { name: "普拉斯", sub: "镜子里的黑色风暴", color: PALETTE.blue, movement: "REBEL", identity: "你赤裸地面对那些不可言说的真相。你的文字像手术刀，划开生活的假象。你不仅反抗外部的压抑，你更在反抗那个被驯化的自我。你试图通过一种极端的、带刺的真实，去索要一个从未被定义的姓名。", longDesc: "你具有极致的激烈与真诚。你拒绝任何形式的涂抹与美化。你的诗是对深渊的凝视，充满了金属般的锋利。这种真实虽然带有自毁的底色，但它也完成了一种令人屏息的灵魂解放。证明了疼痛也可以是美的极致。", stats: [95, 55, 80, 45, 92], quote: "我从灰烬中升起，我以人类为食。", anxiety: "被琐碎平庸的角色所吞噬。你最怕生活变成一种名为‘主妇’或‘社会齿轮’的慢速自杀。", shadow: "过于激烈的真实往往会灼伤自己和身边的人。你的情感能量太大，常规的容器根本无法承载。", antidote: "学会与影子温柔共处。在对抗世界的同时，也给自己留出一点可以用来软弱的缓冲区。", introBooks: [{title: "《钟形罩》", desc: "在窒息中寻找自我的杰作。看一个女性灵魂如何试图逃离那个密闭的、透明的社会标准。"}, {title: "《爱丽儿》", desc: "普拉斯最巅峰、最尖锐的绝响。每一句诗都像是带血的刀片，切割着虚伪的空气。"}] },
            GLUCK: { name: "格丽克", sub: "清冷的真理剥蚀者", color: PALETTE.blue, movement: "SAGE", identity: "你的文字是极简且严厉的。你剔除掉所有多余的脂肪，只留下骨骼和真相。你对生命本质的追索带有某种剥落感的冷酷。你拒绝安慰，只接受清澈的真相。你觉得‘美’如果不是建立在丧失的基础上，那便毫无尊严。", longDesc: "你是思维的建筑师。你的诗是对丧失、童年与命运的冷峻回溯。你用一种接近冰点的冷静，观察生命中那些最剧烈的断裂。这种极度的克制产生了一种令人战栗的力量。唯有在彻底荒芜后，才能看见真实的野鸢尾。", stats: [35, 96, 70, 45, 90], quote: "在生命的终点，并没有所谓的报偿。", anxiety: "情感的泛滥会毁掉结构的精密。你恐惧那些无法受智性控制的、非理性的冲动。", shadow: "由于过度冷静而显得冷酷。你对真相的洁癖往往让你在人际交往中显得有些咄咄逼人和不近人情。", antidote: "接纳一次‘不完美的丰盛’。允许生活呈现出那种无法被提炼、无法被总结的、混乱的生命力。", introBooks: [{title: "《野鸢尾》", desc: "关于生存与救赎的终极对话。看生命如何在丧失与重生的轮回中，寻找那个不灭的内核。"}, {title: "《月光的合金》", desc: "精选集。记录了她如何用金属般的词汇，剥蚀掉生活的虚饰，露出带刺的真实。"}] }
            // 补充逻辑已全覆盖
        };

        const QUESTIONS = [
            { text: "半夜你在空荡荡的街头，看到一个路灯坏了，正对着大街疯狂地闪烁，你会：", options: [{ text: "觉得这乱闪的节奏很带劲，甚至想跟着灯光跳一支舞", type: "REBEL" }, { text: "停下来盯着它看，琢磨它是哪根线路出了问题", type: "SAGE" }, { text: "觉得灯光闪得特别忧郁，像个在黑暗里挣扎的灵魂", type: "IDEALIST" }, { text: "看一眼就继续赶路，反正天亮了它自然就熄了", type: "WANDERER" }] },
            { text: "一个老妇人在街角卖“遗憾”，你身上唯一的钱只够买回一段记忆：", options: [{ text: "买回那次我本该愤怒却选择沉默的瞬间，这次我要大声喊出来", type: "REBEL" }, { text: "买回那次错失的真相细节，我需要知道那一切是如何发生的", type: "SAGE" }, { text: "买回那段已经消失的初恋，哪怕那只是我脑补出来的幻觉", type: "IDEALIST" }, { text: "不买，遗憾是我旅途的一部分，没有它们我走不到现在", type: "WANDERER" }] },
            { text: "你在梦中来到一个禁止语言的国度，官员要求你上交所有的词汇：", options: [{ text: "交出一部分，但私藏几个最锋利的脏词用来随时反击", type: "REBEL" }, { text: "寻找这个禁令背后的逻辑漏洞，寻找不需要语言的代码", type: "SAGE" }, { text: "把最美的词绣在内衣里，贴着心脏保存", type: "IDEALIST" }, { text: "交出全部，看向没有边境的荒野", type: "WANDERER" }] },
            { text: "如果你能拥有一种诅咒人的力量，你最想让你的敌人：", options: [{ text: "永远无法再说谎，只能赤裸裸地面对真相带来的羞辱", type: "REBEL" }, { text: "逻辑永远混乱，再也无法通过理性去掌控任何局面", type: "SAGE" }, { text: "审美永远枯竭，只能住在极度丑陋且庸俗的环境里", type: "IDEALIST" }, { text: "丧失所有自尊，彻底变成一个随波逐流的工具", type: "HERO" }] },
            { text: "你发现了一面镜子，它不照你的脸，只照你的“精神负荷”：", options: [{ text: "盯着镜子里的重压，感到一种想彻底摧毁一切的快意", type: "REBEL" }, { text: "分析负荷的成分，看看哪些是可以被剔除的冗余", type: "SAGE" }, { text: "觉得镜子里那种压抑的光影异常凄美，想把它写成诗", type: "IDEALIST" }, { text: "看一眼就走，负荷再重也是我一个人的路", type: "WANDERER" }] },
            { text: "在一场华丽的晚宴上，大家都在谈论名利，你：", options: [{ text: "当场摔碎杯子，让他们闭上那张散发着恶臭的嘴", type: "REBEL" }, { text: "一个人去露台吹风，观察星空那种不需要观众的诚实", type: "WANDERER" }, { text: "在心里构思一首讽刺诗，把这群人解构成一个个滑稽的符号", type: "SAGE" }, { text: "觉得这种嘈杂也是某种‘人世’的温暖，虽然无趣但很真实", type: "HERO" }] },

            { text: "你发现一扇永远关不上的门，风一直往心里灌。这扇门代表你一个无法弥补的遗憾，你会：", options: [{ text: "在门口筑起一道高墙，把它彻底封死在黑暗里", type: "REBEL" }, { text: "搬个板凳坐在门口，静静地听风传来的那个遗憾的回响", type: "IDEALIST" }, { text: "研究风向和气压，试图通过逻辑解释这个遗憾的必然性", type: "SAGE" }, { text: "把这当成家里的一部分，开着门继续生活，让风吹着", type: "WANDERER" }] },
            { text: "如果文字会流血：", options: [{ text: "我会写满一地鲜红，给这世界看", type: "REBEL" }, { text: "我会研究血的流向和凝固的时间", type: "SAGE" }, { text: "我会觉得这种红极度凄艳，适合志哀", type: "IDEALIST" }, { text: "我会放下笔，不再忍心写下去", type: "HERO" }] },
            { text: "如果你发现自己的一生只是别人笔下的一首诗：", options: [{ text: "我会夺过那支笔，自己把结局改了", type: "REBEL" }, { text: "我会感激这个作者，把我的痛苦写得这么准", type: "IDEALIST" }, { text: "我会研究这种元叙事的逻辑漏洞", type: "SAGE" }, { text: "我会静静地等待全诗终结的那一刻", type: "WANDERER" }] },
            { text: "最后，如果你可以变成一件圣器：", options: [{ text: "一把剖开伪善的快刀", type: "REBEL" }, { text: "一架看清星体运行的望远镜", type: "SAGE" }, { text: "一个装满晚霞的墨水瓶", type: "IDEALIST" }, { text: "一张永远折叠不完的旧地图", type: "WANDERER" }] },

            { text: "如果时间是一张纸，你会怎么涂：", options: [{ text: "画满向后的箭头，编一张精密的逻辑网", type: "SAGE" }, { text: "刻几道深见骨头的印子，那是对抗的疤", type: "HERO" }, { text: "随便乱画，让线条自己随风去空白处", type: "WANDERER" }, { text: "一层又一层地涂彩墨，整出个虚幻厚度", type: "IDEALIST" }] },
            { text: "如果你知道明天你就会消失，今晚你会：", options: [{ text: "烧掉所有的笔记，什么也不留给这世界", type: "REBEL" }, { text: "静坐，观察呼吸停止的每一个微小步骤", type: "SAGE" }, { text: "和最爱的人跳一支舞，直到天亮", type: "IDEALIST" }, { text: "一个人去海边，等待那个瞬间", type: "WANDERER" }] },
            { text: "你理想中的伴侣是：", options: [{ text: "能陪我一起推翻世界的人", type: "REBEL" }, { text: "能读懂我所有代码的人", type: "SAGE" }, { text: "像晚霞一样绝美的人", type: "IDEALIST" }, { text: "能和我并肩走在荒野上的人", type: "WANDERER" }, { text: "我就是我自己的唯一伴侣", type: "SAGE" }] },
            { text: "当你走进一个废弃的房间，你第一眼看见的是：", options: [{ text: "墙上的裂缝，它像一个出口", type: "REBEL" }, { text: "积满灰尘的钟表，它停在某个真相时刻", type: "SAGE" }, { text: "破窗帘后面漏进来的一抹月光", type: "IDEALIST" }, { text: "门口那双被踢乱的、走向远方的鞋", type: "WANDERER" }] },
            { text: "最后，如果世界只剩最后一滴墨水，你会：", options: [{ text: "写一个“不”字，哪怕没人看见", type: "REBEL" }, { text: "写下一个关于宇宙起源的公式", type: "SAGE" }, { text: "画一朵正在盛开也正在凋零的花", type: "IDEALIST" }, { text: "在手心画一个指南针，然后出发", type: "WANDERER" }] }
        ];

        const TendencyBar = ({ label, left, right, value }) => (
            <div className="w-full space-y-2">
                <div className="flex justify-between text-[8px] font-bold uppercase opacity-30 tracking-[0.2em] font-sans">
                    <span>{left}</span><span>{label}</span><span>{right}</span>
                </div>
                <div className="h-[1px] w-full bg-[#dcd8cf] relative">
                    <div className="h-2.5 w-2.5 rounded-full bg-white border border-[#3a3833] absolute top-1/2 -translate-y-1/2 shadow-sm transition-all duration-1000" 
                         style={{ left: `${value}%`, transform: 'translate(-50%, -50%)' }}></div>
                </div>
            </div>
        );

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQ, setCurrentQ] = useState(0);
            const [scores, setScores] = useState({ REBEL: 0, SAGE: 0, IDEALIST: 0, WANDERER: 0, HERO: 0 });
            const [history, setHistory] = useState([]);
            const [selectedMulti, setSelectedMulti] = useState([]);
            const [result, setResult] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [refId] = useState(() => Math.random().toString(36).substr(2, 8).toUpperCase());

            const radarRef = useRef(null);
            const captureRef = useRef(null);

            const handleAnswer = (type, index) => {
                const nextScores = { ...scores, [type]: scores[type] + 1 };
                const curHistory = [...history, { scores, currentQ, choiceIndex: index }];
                setHistory(curHistory);
                setScores(nextScores);
                if (currentQ < QUESTIONS.length - 1) { setCurrentQ(currentQ + 1); window.scrollTo(0, 0); }
                else finalizeResult(nextScores, curHistory);
            };

            const handleConfirmMulti = () => {
                if (selectedMulti.length === 0) return;
                const nextScores = { ...scores };
                selectedMulti.forEach(type => { nextScores[type] += 1; });
                setScores(nextScores);
                const curHistory = [...history, { scores, currentQ, choiceIndex: 0 }];
                setHistory(curHistory);
                setSelectedMulti([]); 
                if (currentQ < QUESTIONS.length - 1) { setCurrentQ(currentQ + 1); window.scrollTo(0, 0); }
                else finalizeResult(nextScores, curHistory);
            };

            const finalizeResult = (finalScores, fullHistory) => {
                const top = Object.keys(finalScores).sort().reduce((a, b) => finalScores[a] > finalScores[b] ? a : b);
                const pool = Object.values(POETS).filter(p => p.movement === top).sort((a,b) => a.name.localeCompare(b.name));
                const seed = fullHistory.reduce((sum, h) => sum + (h.choiceIndex || 0), 0);
                setResult(pool[seed % pool.length] || POETS.LI_BAI);
                setStep('result');
                window.scrollTo(0, 0);
            };

            useEffect(() => {
                if (step === 'result' && result && radarRef.current) {
                    const ctx = radarRef.current.getContext('2d');

                        new window.Chart(ctx, {
                            type: 'radar',
                            data: {
                                labels: ['反叛', '智性', '审美', '自由', '意志'],

                            },
                            options: { scales: { r: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { display: false }, min: 0, max: 100, pointLabels: { font: { family: 'Noto Serif SC', size: 10 }, color: '#3a3833' } } }, plugins: { legend: { display: false } }, maintainAspectRatio: false }
                        });
                    }
                }
            }, [step, result]);

            const saveReport = async () => {
                if (!window.html2canvas) return;
                setIsSaving(true);
                try {
                    const canvas = await window.html2canvas(captureRef.current, { scale: 2.5, backgroundColor: '#f4f1ea', useCORS: true });

                } catch (e) { console.error(e); }
                setIsSaving(false);
            };

            return (
                <div className="safe-container">
                    <div className="w-full max-w-[580px] relative">

                                    <div className="h-1/4 w-full" style={{ backgroundColor: PALETTE.blue }}></div>
                                    <div className="h-1/4 w-full" style={{ backgroundColor: PALETTE.teal }}></div>
                                </div>
                                <div className="relative z-10 flex flex-col items-center py-12">
                                    <div className="w-24 h-24 md:w-28 md:h-28 rounded-full shadow-2xl flex items-center justify-center bg-white/40 mb-12" style={{ backgroundColor: PALETTE.yellow }}></div>

                                </div>
                                <button onClick={() => setStep('quiz')} className="relative z-10 px-12 py-4 border border-[#3a3833] text-[10px] tracking-[0.6em] font-bold uppercase transition-all hover:bg-black hover:text-white font-sans">开启测试 / START</button>
                                <div className="absolute bottom-6 left-0 w-full text-[7px] opacity-20 tracking-widest font-sans font-bold uppercase">Posérial Spiritual Experiment 2026</div>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="animate-fade-in space-y-12">
                                <div className="flex justify-between items-end px-4 border-b border-[#3a3833] pb-4">
                                    <button onClick={() => currentQ > 0 ? setCurrentQ(currentQ-1) : setStep('welcome')} className="text-[9px] font-bold opacity-40 uppercase tracking-widest font-sans">← Back</button>
                                    <span className="text-[10px] tracking-[0.5em] font-bold uppercase font-sans text-[#3a3833]">Manuscript {currentQ + 1} / 30</span>
                                    <div className="h-1 w-20 bg-[#dcd8cf] relative"><div className="h-full bg-[#d45a43] transition-all duration-500" style={{ width: `${((currentQ+1)/30)*100}%` }}></div></div>
                                </div>
                                <div className="min-h-[140px] flex items-center justify-center px-6 text-xl md:text-2xl font-bold leading-relaxed text-center tracking-wide text-[#3a3833]">{QUESTIONS[currentQ].text}</div>
                                <div className="grid gap-4 px-4 pb-12">
                                    {QUESTIONS[currentQ].options.map((opt, i) => (
                                        <button key={i} onClick={() => QUESTIONS[currentQ].isMulti ? (selectedMulti.includes(opt.type) ? setSelectedMulti(selectedMulti.filter(t=>t!==opt.type)) : setSelectedMulti([...selectedMulti, opt.type])) : handleAnswer(opt.type, i)}

                                            <span className={`group-hover:translate-x-2 transition-transform inline-block ${QUESTIONS[currentQ].isMulti && selectedMulti.includes(opt.type) ? 'opacity-100 font-bold' : 'opacity-70 font-serif'}`}>{opt.text} {QUESTIONS[currentQ].isMulti && selectedMulti.includes(opt.type) && '✓'}</span>
                                        </button>
                                    ))}
                                    {QUESTIONS[currentQ].isMulti && <button onClick={handleConfirmMulti} className="mt-4 w-full py-4 bg-[#3a3833] text-white text-xs font-bold uppercase tracking-widest font-sans">确认选择 / CONFIRM</button>}
                                </div>
                            </div>
                        )}

                        {step === 'result' && result && (
                            <div className="animate-fade-in space-y-12 pb-20">
                                <div ref={captureRef} className="bg-[#f4f1ea] px-2 py-4">
                                    <div className="bg-[#fcfbf9] border border-[#dcd8cf] p-8 md:p-14 space-y-10 relative overflow-hidden shadow-xl text-left">
                                        <div className="top-line"></div>
                                        <div className="flex flex-col items-center space-y-4 pt-2">
                                            <div className="archetype-box font-sans">ARCHETYPE</div>
                                            <div className="text-[10px] font-mono opacity-20 tracking-tighter font-sans text-stone-400">REF-#{refId}</div>
                                            <h2 className="text-5xl md:text-6xl font-bold tracking-[0.1em] text-center text-[#3a3833]">{result.name}</h2>
                                            <p className="text-lg italic opacity-40 font-serif text-center">— {result.sub} —</p>
                                        </div>

                                        <div className="quote-frame">
                                            <p className="text-2xl md:text-3xl leading-relaxed font-bold tracking-wide font-serif text-[#3a3833]">“{result.quote}”</p>
                                        </div>

                                        <div className="space-y-10">
                                            <div className="flex items-center gap-6">
                                                <h4 className="text-[11px] font-bold tracking-[0.4em] uppercase text-[#d45a43] font-sans whitespace-nowrap">THE CORE / 灵魂本色</h4>
                                                <div className="h-[0.5px] w-full bg-[#dcd8cf]"></div>
                                            </div>
                                            <div className="space-y-12">

                                        </div>

                                                <TendencyBar label="灵性 vs 现实" left="Spirit" right="Reality" value={result.stats[0]} />

                                            </div>
                                            <div className="flex flex-col items-center justify-center p-6 bg-[#fffcf5] border border-[#dcd8cf]/50">
                                                <div className="w-44 h-44 opacity-90"><canvas ref={radarRef}></canvas></div>
                                                <div className="mt-4 text-[10px] font-bold opacity-20 tracking-widest font-sans">DIMENSION RADAR</div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-0 border border-[#d45a43]/40 divide-y md:divide-y-0 md:divide-x divide-[#d45a43]/20 bg-[#fffcf5]/30">
                                            <div className="p-8 text-center bg-[#fffcf5]">
                                                <span className="text-[9px] font-bold opacity-40 uppercase tracking-widest block mb-4 font-sans">Anxiety / 焦虑</span>
                                                <p className="text-xs italic leading-relaxed text-[#3a3833] font-medium text-justify">{result.anxiety}</p>
                                            </div>
                                            <div className="p-8 text-center bg-[#fffcf5]">
                                                <span className="text-[9px] font-bold opacity-40 uppercase tracking-widest block mb-4 font-sans">Shadow / 阴影</span>
                                                <p className="text-xs italic leading-relaxed text-[#3a3833] font-medium text-justify">{result.shadow}</p>
                                            </div>
                                            <div className="p-8 bg-[#d45a43]/5 flex flex-col justify-center items-center text-center">
                                                <span className="text-[9px] font-bold text-[#d45a43] uppercase mb-4 font-sans">Antidote / 解药</span>
                                                <p className="text-sm font-bold tracking-widest italic text-[#3a3833] leading-relaxed">“{result.antidote}”</p>
                                            </div>
                                        </div>

                                        <div className="space-y-8 pt-10 border-t border-[#dcd8cf]">
                                            <h4 className="text-[10px] font-bold tracking-[0.8em] text-center uppercase opacity-30 font-sans">Recommended Reading</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                {result.introBooks.map(b => (
                                                    <div key={b.title} className="p-6 bg-white border border-[#dcd8cf] space-y-4 transition-all hover:border-[#d45a43] group shadow-sm text-left">
                                                        <h5 className="font-bold text-lg tracking-wide group-hover:text-[#d45a43] transition-colors">{b.title}</h5>
                                                        <p className="text-[11px] opacity-60 italic font-serif leading-relaxed text-justify">{b.desc}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="w-full h-8 flex mt-4 opacity-50">{[PALETTE.green, PALETTE.blue, PALETTE.teal, PALETTE.lavender, PALETTE.yellow].map(c => <div key={c} className="flex-1" style={{ backgroundColor: c }}></div>)}</div>
                                        <div className="text-[8px] opacity-20 tracking-[0.6em] text-center font-bold uppercase font-sans text-[#3a3833]">Posérial Spiritual Experiment 2026</div>
                                    </div>
                                </div>
                                <div className="px-8 space-y-4 pb-12">
                                    <button onClick={saveReport} disabled={isSaving} className="w-full py-5 bg-[#3a3833] text-[#f4f1ea] text-xs tracking-[0.6em] font-bold shadow-xl uppercase transition-all hover:bg-black disabled:opacity-50 font-sans">{isSaving ? "MANUSCRIPT SAVING..." : "保存灵魂手稿报告"}</button>
                                    <button onClick={() => window.location.reload()} className="w-full py-4 border-2 border-[#3a3833] text-[10px] tracking-[0.5em] font-bold uppercase transition-all hover:bg-[#3a3833] hover:text-white font-sans">重新测试 / RETRY</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
