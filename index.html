            { text: "关于“故乡”，你的感觉是：", options: [{ text: "故乡就是我自己的内心，此外皆是客居", type: "REBEL" }, { text: "它是一个已经失落的坐标，我无法回去了", type: "SAGE" }, { text: "它是一块陈年的旧伤疤，每当想起就痛", type: "IDEALIST" }, { text: "故乡在远方，在每一个我还没去过的地方", type: "WANDERER" }] },
            { text: "在你的书架上，最显眼的位置放着：", options: [{ text: "一本写满了涂改与咒骂的私人笔记", type: "REBEL" }, { text: "一本满是注脚的《几何学原理》或佛经", type: "SAGE" }, { text: "一本夹着枯萎花瓣的无题情书集", type: "IDEALIST" }, { text: "一本折角严重的、满是泥土印的旧地图", type: "WANDERER" }] },
            { text: "如果生命是一场剧，你扮演的角色是：", options: [{ text: "那个最后杀出重围的异教徒", type: "REBEL" }, { text: "那个坐在台下看戏、甚至没买票的观众", type: "SAGE" }, { text: "那个即使主角死了也要把戏唱完的配角", type: "IDEALIST" }, { text: "那个一直在换幕，最后消失在布景后的剧务", type: "WANDERER" }] },
            { text: "你最喜欢的颜色是：", options: [{ text: "火一样的红色，象征着燃烧与毁灭", type: "REBEL" }, { text: "冰一样的透明色，代表着绝对的清澈", type: "SAGE" }, { text: "晚霞般的紫金色，美在消失的前一秒", type: "IDEALIST" }, { text: "大地般的灰绿色，那是自然的保护色", type: "WANDERER" }] },
            { id: 21, text: "有人递给你一杯‘忘忧水’，喝了能抹掉这辈子最疼的那段记忆，但以后你也写不出深刻的句子了，你会：", options: [{ text: "不喝，那种疼是我身体的一部分，是我唯一的墨水", type: "REBEL" }, { text: "犹豫地推开，比起快乐，我更怕变得空洞和平庸", type: "IDEALIST" }, { text: "研究这水的成分，看看能不能只抹掉疼而不伤灵魂", type: "SAGE" }, { text: "喝掉它，我只想做一个没心没肺的普通快活人", type: "WANDERER" }] },
            { text: "如果文字会流血：", options: [{ text: "我会写满一地鲜红，给这世界看", type: "REBEL" }, { text: "我会研究血的流向和凝固的时间", type: "SAGE" }, { text: "我会觉得这种红极度凄艳，适合志哀", type: "IDEALIST" }, { text: "我会放下笔，不再忍心写下去", type: "HERO" }] },
            { text: "如果你发现自己的一生只是别人笔下的一首诗：", options: [{ text: "我会夺过那支笔，自己把结局改了", type: "REBEL" }, { text: "我会感激这个作者，把我的痛苦写得这么准", type: "IDEALIST" }, { text: "我会研究这种元叙事的逻辑漏洞", type: "SAGE" }, { text: "我会静静地等待全诗终结的那一刻", type: "WANDERER" }] },
            { text: "最后，如果你可以变成一件圣器：", options: [{ text: "一把剖开伪善的快刀", type: "REBEL" }, { text: "一架看清星体运行的望远镜", type: "SAGE" }, { text: "一个装满晚霞的墨水瓶", type: "IDEALIST" }, { text: "一张永远折叠不完的旧地图", type: "WANDERER" }] },
            { id: 25, text: "你发现一扇永远关不上的门，风一直往你心里灌。这扇门代表你一个无法弥补的遗憾，你会：", options: [{ text: "在门口筑起一道高墙，把它彻底封死在黑暗里", type: "REBEL" }, { text: "搬个板凳坐在门口，静静地听风传来的那个遗憾的回响", type: "IDEALIST" }, { text: "研究风向和气压，试图通过逻辑解释这个遗憾的必然性", type: "SAGE" }, { text: "把这当成家里的一部分，开着门继续生活，让风吹着", type: "WANDERER" }] },
            { id: 26, text: "如果要给你的生命贴上‘出厂标签’，你会勾选哪些项？（多选）", isMulti: true, options: [{ text: "不合时宜的愤怒", type: "REBEL" }, { text: "无可救药的浪漫", type: "IDEALIST" }, { text: "绝对清醒的旁观", type: "SAGE" }, { text: "永无止境的寻找", type: "WANDERER" }, { text: "不值一钱的悲悯", type: "HERO" }] },
            { text: "你在河边看到一个溺水的人，但救他意味着你会错过此生唯一的灵感：", options: [{ text: "直接跳下去救人，诗以后再写", type: "HERO" }, { text: "记录下这一幕的残酷，作为人类生存的注脚", type: "SAGE" }, { text: "感到极度的幻灭，然后转身离开", type: "REBEL" }, { text: "为这种不可挽回的生命消失写一首挽歌", type: "IDEALIST" }] },
            { text: "你理想中的伴侣是：", options: [{ text: "能陪我一起推翻世界的人", type: "REBEL" }, { text: "能读懂我所有代码的人", type: "SAGE" }, { text: "像晚霞一样绝美的人", type: "IDEALIST" }, { text: "能和我并肩走在荒野上的人", type: "WANDERER" }, { text: "我就是我自己的唯一伴侣", type: "SAGE" }] },
            { text: "当你走进一个废弃的房间，你第一眼看见的是：", options: [{ text: "墙上的裂缝，它像一个出口", type: "REBEL" }, { text: "积满灰尘的钟表，它停在某个真相时刻", type: "SAGE" }, { text: "破窗帘后面漏进来的一抹月光", type: "IDEALIST" }, { text: "门口那双被踢乱的、走向远方的鞋", type: "WANDERER" }] },
            { text: "最后，如果世界只剩最后一滴墨水，你会：", options: [{ text: "写一个“不”字，哪怕没人看见", type: "REBEL" }, { text: "写下一个关于宇宙起源的公式", type: "SAGE" }, { text: "画一朵正在盛开也正在凋零的花", type: "IDEALIST" }, { text: "在手心画一个指南针，然后出发", type: "WANDERER" }] }
        ];

        // --- 核心组件 ---
        const TendencyBar = ({ label, left, right, value, themeColor }) => (
            <div className="w-full space-y-2">
                <div className="flex justify-between text-[10px] font-bold uppercase tracking-[0.2em] text-stone-500 font-sans">
                    <span>{left}</span><span>{label}</span><span>{right}</span>
                </div>
                <div className="h-[2px] w-full bg-[#dcd8cf] relative">
                    <div className="h-3 w-3 rounded-full absolute top-1/2 -translate-y-1/2 transition-all duration-1000 shadow-sm border border-stone-800" 
                         style={{ left: `${value}%`, transform: 'translate(-50%, -50%)', backgroundColor: themeColor || '#ffffff' }}></div>
                </div>
            </div>
        );

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQ, setCurrentQ] = useState(0);
            const [scores, setScores] = useState({ REBEL: 0, SAGE: 0, IDEALIST: 0, WANDERER: 0, HERO: 0 });
            const [history, setHistory] = useState([]);
            const [selectedMulti, setSelectedMulti] = useState([]);
            const [result, setResult] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [refId] = useState(() => Math.random().toString(36).substr(2, 8).toUpperCase());

            const radarRef = useRef(null);
            const captureRef = useRef(null);

            const handleAnswer = (type) => {
                const nextScores = { ...scores, [type]: scores[type] + 1 };
                const curHistory = [...history, { scores, currentQ }];
                setHistory(curHistory);
                setScores(nextScores);
                if (currentQ < QUESTIONS.length - 1) { setCurrentQ(currentQ + 1); window.scrollTo(0, 0); }
                else finalizeResult(nextScores);
            };

            const handleConfirmMulti = () => {
                if (selectedMulti.length === 0) return;
                const nextScores = { ...scores };
                selectedMulti.forEach(type => { nextScores[type] += 1; });
                setScores(nextScores);
                const curHistory = [...history, { scores, currentQ }];
                setHistory(curHistory);
                setSelectedMulti([]); 
                if (currentQ < QUESTIONS.length - 1) { setCurrentQ(currentQ + 1); window.scrollTo(0, 0); }
                else finalizeResult(nextScores);
            };

            const finalizeResult = (finalScores) => {
                const top = Object.keys(finalScores).sort((a,b) => finalScores[b] - finalScores[a])[0];
                const pool = Object.values(POETS).filter(p => p.movement === top);
                setResult(pool[Math.floor(Math.random() * pool.length)] || POETS.SZYMBORSKA);
                setStep('result');
                window.scrollTo(0, 0);
            };

            useEffect(() => {
                if (step === 'result' && result && radarRef.current) {
                    const ctx = radarRef.current.getContext('2d');
                    if (window.Chart) {
                        new window.Chart(ctx, {
                            type: 'radar',
                            data: {
                                labels: ['反叛', '智性', '审美', '自由', '意志'],
                                datasets: [{ data: result.stats, backgroundColor: `${result.color}25`, borderColor: '#2a2824', borderWidth: 1, pointRadius: 3, pointBackgroundColor: result.color }]
                            },
                            options: { 
                                scales: { 
                                    r: { 
                                        grid: { color: 'rgba(0,0,0,0.06)' }, 
                                        ticks: { display: false }, 
                                        min: 0, max: 100,
                                        pointLabels: { font: { family: 'Noto Serif SC', size: 11, weight: 'bold' }, color: '#2a2824' }
                                    } 
                                }, 
                                plugins: { legend: { display: false } }, 
                                maintainAspectRatio: false 
                            }
                        });
                    }
                }
            }, [step, result]);

            const saveReport = async () => {
                if (!window.html2canvas) return;
                setIsSaving(true);
                try {
                    const canvas = await window.html2canvas(captureRef.current, { scale: 2.5, backgroundColor: '#f4f1ea', useCORS: true });
                    const link = document.createElement('a'); link.download = `POET_REPORT_${result.name}.png`;
                    link.href = canvas.toDataURL('image/png'); link.click();
                } catch (e) { console.error(e); }
                setIsSaving(false);
            };

            return (
                <div className="safe-container">
                    <div className="w-full max-w-[580px] relative">
                        {step === 'welcome' && (
                            <div className="animate-fade-in bg-[#fcfbf9] border border-[#dcd8cf] p-10 md:p-14 text-center shadow-xl relative overflow-hidden">
                                <div className="deckled-top"></div>
                                <div className="absolute top-0 left-0 w-full h-1/2 opacity-10 pointer-events-none">
                                    <div className="h-1/2 w-full" style={{ backgroundColor: PALETTE.green }}></div>
                                    <div className="h-1/4 w-full" style={{ backgroundColor: PALETTE.blue }}></div>
                                    <div className="h-1/4 w-full" style={{ backgroundColor: PALETTE.teal }}></div>
                                </div>
                                <div className="relative z-10 flex flex-col items-center py-12">
                                    <div className="w-24 h-24 md:w-28 md:h-28 rounded-full shadow-2xl flex items-center justify-center bg-white/40 mb-12" style={{ backgroundColor: PALETTE.yellow }}></div>
                                    <h1 className="whitespace-nowrap text-[2.2rem] sm:text-[2.6rem] md:text-[3rem] lg:text-[3.2rem] font-light tracking-[0.4em] leading-tight text-[#2a2824] px-2 font-serif">诗人的回响</h1>
                                </div>
                                <button onClick={() => setStep('quiz')} className="relative z-10 px-12 py-4 border border-[#2a2824] text-[11px] tracking-[0.6em] font-bold uppercase transition-all hover:bg-black hover:text-white font-sans">开启测试 / START</button>
                                <div className="absolute bottom-6 left-0 w-full text-[7px] opacity-30 tracking-widest font-sans font-bold uppercase text-stone-500 text-center">POSÉRIAL SPIRITUAL EXPERIMENT 2026</div>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="animate-fade-in space-y-12">
                                <div className="flex justify-between items-end border-b border-stone-800 pb-4">
                                    <button onClick={() => currentQ > 0 ? setCurrentQ(currentQ-1) : setStep('welcome')} className="text-[10px] font-bold opacity-60 uppercase tracking-widest font-sans">← Back</button>
                                    <span className="text-[11px] tracking-[0.5em] font-bold font-sans text-stone-800">Manuscript {currentQ + 1} / 30</span>
                                    <div className="h-1.5 w-24 bg-stone-200 relative overflow-hidden"><div className="h-full bg-[#d45a43] transition-all duration-500" style={{ width: `${((currentQ+1)/30)*100}%` }}></div></div>
                                </div>
                                <div className="min-h-[140px] flex items-center justify-center text-xl md:text-2xl font-bold leading-relaxed text-center tracking-wide text-[#2a2824]">{QUESTIONS[currentQ].text}</div>
                                <div className="grid gap-4 px-4 pb-12">
                                    {QUESTIONS[currentQ].options.map((opt, i) => (
                                        <button key={i} onClick={() => QUESTIONS[currentQ].isMulti ? (selectedMulti.includes(opt.type) ? setSelectedMulti(selectedMulti.filter(t=>t!==opt.type)) : setSelectedMulti([...selectedMulti, opt.type])) : handleAnswer(opt.type)}
                                            className={`w-full p-6 text-sm border-2 transition-all text-left group ${QUESTIONS[currentQ].isMulti && selectedMulti.includes(opt.type) ? 'border-[#d45a43] bg-[#d45a43]/10 shadow-inner' : 'border-stone-200 bg-white/80 hover:border-stone-800'}`}>
                                            <span className={`group-hover:translate-x-2 transition-transform inline-block ${QUESTIONS[currentQ].isMulti && selectedMulti.includes(opt.type) ? 'opacity-100 font-bold text-stone-900' : 'opacity-80 font-serif'}`}>{opt.text} {QUESTIONS[currentQ].isMulti && selectedMulti.includes(opt.type) && '✓'}</span>
                                        </button>
                                    ))}
                                    {QUESTIONS[currentQ].isMulti && <button onClick={handleConfirmMulti} className="mt-4 w-full py-5 bg-stone-900 text-white text-xs font-bold uppercase tracking-widest shadow-xl">确认选择 / CONFIRM</button>}
                                </div>
                            </div>
                        )}

                        {step === 'result' && result && (
                            <div className="animate-fade-in space-y-12 pb-20">
                                <div ref={captureRef} className="bg-[#f4f1ea] px-2 py-4">
                                    <div className="bg-[#fcfbf9] border border-[#dcd8cf] p-8 md:p-14 space-y-12 relative overflow-hidden shadow-xl text-left">
                                        <div className="top-accent-line"></div>
                                        <div className="flex flex-col items-center space-y-5 pt-2">
                                            <div className="archetype-tag-box font-sans uppercase">Archetype</div>
                                            <div className="text-[10px] font-mono opacity-40 tracking-tighter text-stone-500 font-sans">REF-#{refId}</div>
                                            <h2 className="text-5xl md:text-6xl font-bold tracking-[0.1em] text-center text-[#2a2824]">{result.name}</h2>
                                            <p className="text-xl italic font-serif text-center text-stone-600">— {result.sub} —</p>
                                        </div>

                                        <div className="quote-box-refined"><p className="text-2xl md:text-3xl leading-relaxed font-bold tracking-wide font-serif text-stone-800">“{result.quote}”</p></div>

                                        <div className="space-y-10">
                                            <div className="flex items-center gap-6">
                                                <h4 className="text-[12px] font-bold tracking-[0.4em] uppercase text-[#d45a43] font-sans whitespace-nowrap">THE CORE / 灵魂本色</h4>
                                                <div className="h-[0.5px] w-full bg-stone-300"></div>
                                            </div>
                                            <div className="space-y-12">
                                                <p className="text-[1.35rem] md:text-[1.5rem] font-bold leading-relaxed tracking-wide text-justify text-stone-900">{result.identity}</p>
                                                <div className="pl-6 border-l-4 border-[#f9ed8c] italic text-stone-700 text-sm md:text-base leading-loose tracking-widest text-justify">{result.longDesc}</div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-[1.2fr_1fr] gap-12 border-t border-stone-200 pt-12">
                                            <div className="space-y-10 flex flex-col justify-center">
                                                <TendencyBar label="灵性 vs 现实" left="Spirit" right="Reality" value={result.stats[0]} themeColor={result.color} />
                                                <TendencyBar label="解构 vs 构建" left="Decon" right="Build" value={result.stats[1]} themeColor={result.color} />
                                                <TendencyBar label="出世 vs 入世" left="Zen" right="People" value={result.stats[3]} themeColor={result.color} />
                                            </div>
                                            <div className="flex flex-col items-center justify-center p-6 bg-[#fffcf5] border border-stone-200">
                                                <div className="w-44 h-44 opacity-100"><canvas ref={radarRef}></canvas></div>
                                                <div className="mt-4 text-[10px] font-bold opacity-40 tracking-widest uppercase text-stone-500 font-sans">Dimension Radar</div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-0 border border-stone-800/20 divide-y md:divide-y-0 md:divide-x divide-stone-800/20 shadow-sm">
                                            <div className="p-8 text-left bg-white/50">
                                                <span className="text-[10px] font-bold text-stone-500 uppercase tracking-widest block mb-4 font-sans text-center">Anxiety / 焦虑</span>
                                                <p className="text-[13px] italic leading-relaxed text-stone-800 text-justify font-medium">{result.anxiety}</p>
                                            </div>
                                            <div className="p-8 text-left bg-white/50">
                                                <span className="text-[10px] font-bold text-stone-500 uppercase tracking-widest block mb-4 font-sans text-center">Shadow / 阴影</span>
                                                <p className="text-[13px] italic leading-relaxed text-stone-800 text-justify font-medium">{result.shadow}</p>
                                            </div>
                                            <div className="p-8 bg-[#d45a43]/10 flex flex-col justify-center items-center text-center">
                                                <span className="text-[10px] font-bold text-[#d45a43] uppercase mb-4 font-sans tracking-widest">Antidote / 解药</span>
                                                <p className="text-base font-bold tracking-widest italic text-stone-900 leading-relaxed">“{result.antidote}”</p>
                                            </div>
                                        </div>

                                        <div className="space-y-8 pt-10 border-t border-stone-200">
                                            <h4 className="text-[11px] font-bold tracking-[0.8em] text-center uppercase opacity-50 font-sans text-stone-600">Recommended Reading</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                {result.introBooks.map(b => (
                                                    <div key={b.title} className="p-8 bg-white border border-stone-200 space-y-4 hover:border-stone-800 transition-all group shadow-sm text-left">
                                                        <h5 className="font-bold text-xl tracking-wide group-hover:text-[#d45a43] transition-colors text-stone-900" style={{ color: result.color }}>《{b.title.replace('《','').replace('》','')}》</h5>
                                                        <p className="text-[13px] text-stone-700 italic font-serif leading-relaxed text-justify border-t border-stone-100 pt-3">{b.desc}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="w-full h-8 flex mt-4 opacity-70">{[PALETTE.green, PALETTE.blue, PALETTE.teal, PALETTE.lavender, PALETTE.yellow].map(c => <div key={c} className="flex-1" style={{ backgroundColor: c }}></div>)}</div>
                                        <div className="text-[9px] opacity-40 tracking-[0.6em] text-center font-bold font-sans uppercase text-stone-600">Posérial Spiritual Experiment 2026</div>
                                    </div>
                                </div>
                                <div className="px-8 space-y-4 pb-12">
                                    <button onClick={saveReport} disabled={isSaving} className="w-full py-6 bg-stone-900 text-white text-xs tracking-[0.6em] font-bold shadow-2xl uppercase transition-all hover:bg-black disabled:opacity-50 font-sans">
                                        {isSaving ? "MANUSCRIPT SAVING..." : "保存灵魂手稿报告"}
                                    </button>
                                    <button onClick={() => window.location.reload()} className="w-full py-4 border-2 border-stone-900 text-[10px] tracking-[0.5em] font-bold uppercase transition-all hover:bg-stone-900 hover:text-white font-sans">重新测试 / RETRY</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
