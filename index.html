            const [refId] = useState(() => Math.random().toString(36).substr(2, 6).toUpperCase());

            const radarRef = useRef(null);
            const captureRef = useRef(null);
            const chartInstance = useRef(null);

            const handleAnswer = (type) => {
                const nextScores = { ...scores, [type]: scores[type] + 1 };
                setHistory([...history, { scores, currentQ }]);
                setScores(nextScores);
                
                if (currentQ < QUESTIONS.length - 1) {
                    setCurrentQ(currentQ + 1);
                    window.scrollTo(0, 0);
                } else {
                    finalizeResult(nextScores);
                }
            };

            const handleMultiSelect = (type) => {
                if (selectedMulti.includes(type)) {
                    setSelectedMulti(selectedMulti.filter(t => t !== type));
                } else {
                    setSelectedMulti([...selectedMulti, type]);
                }
            };

            const handleConfirmMulti = () => {
                if (selectedMulti.length === 0) return;
                const nextScores = { ...scores };
                selectedMulti.forEach(type => {
                    nextScores[type] = nextScores[type] + 1;
                });
                setHistory([...history, { scores, currentQ }]);
                setScores(nextScores);
                setSelectedMulti([]);
                
                if (currentQ < QUESTIONS.length - 1) {
                    setCurrentQ(currentQ + 1);
                    window.scrollTo(0, 0);
                } else {
                    finalizeResult(nextScores);
                }
            };

            const finalizeResult = (finalScores) => {
                const top = Object.keys(finalScores).reduce((a, b) => finalScores[a] > finalScores[b] ? a : b);
                const pool = Object.values(POETS).filter(p => p.movement === top);
                setResult(pool[Math.floor(Math.random() * pool.length)] || POETS.LI_BAI);
                setStep('result');
                setShowCard(true);
                window.scrollTo(0, 0);
            };

            const handlePrev = () => {
                if (currentQ > 0) {
                    const last = history.pop();
                    setScores(last.scores);
                    setCurrentQ(last.currentQ);
                    setHistory([...history]);
                    setSelectedMulti([]);
                } else {
                    setStep('welcome');
                }
            };

            useEffect(() => {
                if (step === 'result' && result && radarRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    const ctx = radarRef.current.getContext('2d');
                    if (window.Chart) {
                        chartInstance.current = new window.Chart(ctx, {
                            type: 'radar',
                            data: {
                                labels: ['反叛', '智性', '审美', '自由', '意志'],
                                datasets: [{ data: result.stats, backgroundColor: `${result.color}11`, borderColor: result.color, borderWidth: 1, pointRadius: 1 }]
                            },
                            options: { scales: { r: { grid: { color: 'rgba(0,0,0,0.03)' }, angleLines: { display: false }, ticks: { display: false }, min: 0, max: 100 } }, plugins: { legend: { display: false } }, maintainAspectRatio: false }
                        });
                    }
                }
            }, [step, result]);

            useEffect(() => {
                const handleC = (e) => { 
                    const k = e.target.closest('.keyword'); 
                    setTooltip(k ? k.getAttribute('data-note') : null); 
                };
                document.addEventListener('click', handleC); 
                return () => document.removeEventListener('click', handleC);
            }, []);

            const saveReport = async () => {
                if (!window.html2canvas) return;
                setIsSaving(true);
                try {
                    const canvas = await window.html2canvas(captureRef.current, { scale: 2.5, backgroundColor: PALETTE.paper, useCORS: true });
                    const link = document.createElement('a');
                    link.download = `POET_SOUL_${result.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (e) { console.error(e); }
                setIsSaving(false);
            };

            const currentQuestion = QUESTIONS[currentQ];

            return (
                <div className="min-h-screen flex items-center justify-center p-4 md:p-12 font-serif text-[#3a3833]" style={{ backgroundColor: PALETTE.paper }}>
                    <div className="w-full max-w-[500px] relative">
                        
                        {/* 1. 欢迎页 */}
                        {step === 'welcome' && (
                            <div className="animate-fade-in">
                                <DeckledPaper className="aspect-[3/4.5] flex flex-col items-center justify-center overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-1/2 opacity-10 pointer-events-none">
                                        <div className="h-1/2 w-full" style={{ backgroundColor: PALETTE.green }}></div>
                                        <div className="h-1/4 w-full" style={{ backgroundColor: PALETTE.blue }}></div>
                                        <div className="h-1/4 w-full" style={{ backgroundColor: PALETTE.teal }}></div>
                                    </div>
                                    <div className="absolute top-10 left-10"><VerticalTitle text="泊 [ POSÉRIAL ] 序" /></div>
                                    
                                    <div className="relative z-10 flex flex-col items-center space-y-12">
                                        <div className="w-32 h-32 rounded-full shadow-2xl flex items-center justify-center bg-white/40" style={{ backgroundColor: PALETTE.yellow }}>
                                        </div>
                                        <div className="text-center space-y-4">
                                            <h1 className="text-4xl md:text-5xl font-bold tracking-[0.3em] leading-tight text-[#3a3833]">诗人的回响</h1>
                                        </div>
                                    </div>
                                    <button onClick={() => setStep('quiz')} className="absolute bottom-24 px-12 py-4 border border-[#3a3833] text-[10px] tracking-[0.6em] font-bold uppercase transition-all hover:bg-black hover:text-white">开启漫游</button>
                                    <div className="absolute bottom-6 flex gap-2 opacity-30"><span className="w-1.5 h-1.5 rounded-full bg-[#d45a43]"></span>{[...Array(4)].map((_,i) => <span key={i} className="w-1.5 h-1.5 rounded-full border border-black"></span>)}</div>
                                </DeckledPaper>
                            </div>
                        )}

                        {/* 2. 测试页 */}
                        {step === 'quiz' && (
                            <div className="animate-fade-in space-y-10">
                                <div className="w-full h-16 flex flex-col overflow-hidden opacity-80">
                                    <div className="h-1/2 w-full flex"><div className="flex-1" style={{ backgroundColor: PALETTE.green }}></div><div className="flex-1" style={{ backgroundColor: PALETTE.yellow }}></div></div>
                                    <div className="h-1/4 w-full" style={{ backgroundColor: PALETTE.blue }}></div><div className="h-1/4 w-full" style={{ backgroundColor: PALETTE.teal }}></div>
                                </div>
                                
                                <div className="flex justify-between items-end px-4 border-b border-[#3a3833] pb-4">
                                    <button onClick={handlePrev} className="text-[9px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition-all">← Back</button>
                                    <span className="text-[10px] tracking-[0.5em] font-bold uppercase">Manuscript {String(currentQ + 1).padStart(2, '0')}</span>
                                    <div className="h-1 w-20 bg-[#dcd8cf] relative"><div className="h-full bg-[#d45a43] transition-all duration-500" style={{ width: `${((currentQ+1)/30)*100}%` }}></div></div>
                                </div>

                                <div className="min-h-[160px] flex items-center justify-center px-6 text-xl md:text-2xl font-bold leading-relaxed text-center tracking-wide text-[#3a3833]">{currentQuestion.text}</div>
                                
                                <div className="grid gap-4 px-4 pb-12">
                                    {currentQuestion.options.map((opt, i) => (
                                        <button 
                                            key={i} 
                                            onClick={() => currentQuestion.isMulti ? handleMultiSelect(opt.type) : handleAnswer(opt.type)}
                                            className={`w-full p-6 text-sm border transition-all text-left group ${
                                                currentQuestion.isMulti && selectedMulti.includes(opt.type) 
                                                    ? 'border-[#d45a43] bg-[#d45a43]/5' 
                                                    : 'border-[#dcd8cf] bg-white/60 hover:border-[#3a3833]'
                                            }`}
                                        >
                                            <span className={`group-hover:translate-x-2 transition-transform inline-block ${
                                                currentQuestion.isMulti && selectedMulti.includes(opt.type) ? 'opacity-100 font-bold' : 'opacity-70 group-hover:opacity-100'
                                            }`}>
                                                {opt.text}
                                                {currentQuestion.isMulti && selectedMulti.includes(opt.type) && <span className="ml-2">✓</span>}
                                            </span>
                                        </button>
                                    ))}
                                    
                                    {currentQuestion.isMulti && (
                                        <button 
                                            onClick={handleConfirmMulti}
                                            disabled={selectedMulti.length === 0}
                                            className={`mt-6 w-full py-4 border-2 font-bold uppercase tracking-[0.4em] text-xs transition-all ${
                                                selectedMulti.length > 0 ? 'bg-[#3a3833] text-white border-[#3a3833]' : 'opacity-30 border-[#3a3833]'
                                            }`}
                                        >
                                            确认选择 / CONFIRM
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* 3. 结果页 */}
                        {step === 'result' && result && (
                            <div className="animate-fade-in space-y-8 pb-20">
                                {showCard && (
                                    <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm" onClick={() => setShowCard(false)}>
                                        <div className="bg-white p-10 max-w-sm w-full border-t-8 border-[#d45a43] shadow-2xl animate-fade-in">
                                            <div className="text-[10px] tracking-[0.5em] opacity-40 mb-8 uppercase">MENTOR PROFILE / 导师名片</div>
                                            <h3 className="text-4xl font-bold mb-4 tracking-tighter">{result.name}</h3>
                                            <p className="text-sm opacity-60 mb-10">— {result.sub} —</p>
                                            <p className="text-xl italic font-bold mb-12 leading-relaxed">“{result.quote}”</p>
                                            <button className="w-full py-4 bg-[#3a3833] text-white text-[10px] tracking-[0.4em] uppercase font-bold">进入灵魂报告</button>
                                        </div>
                                    </div>
                                )}

                                <div ref={captureRef} className="bg-[#f4f1ea] px-2 py-4">
                                    <DeckledPaper className="p-8 md:p-10 space-y-10">
                                        
                                        <div className="text-center space-y-5 pt-4">
                                            <div className="w-16 h-[2px] mx-auto" style={{ backgroundColor: result.color }}></div>
                                            <span className="text-[11px] tracking-[0.5em] text-[#d45a43] font-bold uppercase">Archetype Report</span>
                                            <h2 className="text-4xl md:text-5xl font-bold tracking-tighter" style={{ color: PALETTE.text }}>{result.name}</h2>
                                        </div>

                                        <div className="w-full py-10 border-y border-[#dcd8cf] text-center bg-[#fffcf5] text-2xl font-bold px-8 italic leading-relaxed">“{result.quote}”</div>

                                        <div className="w-full flex gap-10 items-start">
                                            <VerticalTitle text="THE CORE / 灵魂本色" color={PALETTE.accent} className="text-xs font-bold pt-1" />
                                            <div className="flex-1 flex flex-col gap-6">
                                                <div className="text-2xl font-bold leading-normal tracking-widest h-[320px]" style={{ writingMode: 'vertical-rl' }} dangerouslySetInnerHTML={{ __html: result.identity }}></div>
                                                <div className="text-xs leading-loose opacity-50 tracking-widest text-justify pl-4 border-l border-[#dcd8cf]/50">{result.longDesc}</div>
                                            </div>
                                            <div className="w-32 h-32 md:w-40 md:h-40 flex items-center justify-center opacity-80"><canvas ref={radarRef}></canvas></div>
                                        </div>

                                        <div className="space-y-10 py-10 border-t border-[#dcd8cf]">
                                            <TendencyBar label="灵性 vs 现实" left="Spirit" right="Reality" value={result.stats[0]} />
                                            <TendencyBar label="解构 vs 构建" left="Decon" right="Build" value={result.stats[1]} />
                                            <TendencyBar label="出世 vs 入世" left="Zen" right="People" value={result.stats[3]} />
                                        </div>

                                        <div className="w-full grid grid-cols-2 divide-x divide-[#dcd8cf] border-t border-[#dcd8cf] pt-10">
                                            <div className="pr-6 space-y-2"><span className="text-[10px] font-bold text-[#d45a43] uppercase tracking-widest">ANXIETY / 焦虑</span><p className="text-xs opacity-60 italic">{result.anxiety}</p></div>
                                            <div className="pl-6 space-y-2"><span className="text-[10px] font-bold text-[#d45a43] uppercase tracking-widest">ANTIDOTE / 解药</span><p className="text-xs font-bold italic">“{result.antidote}”</p></div>
                                        </div>

                                        <div className="space-y-6 pt-10 border-t border-[#dcd8cf]">
                                            <h4 className="text-[10px] font-bold tracking-[0.5em] text-center uppercase opacity-40">入门书籍推荐 / READING</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {result.introBooks.map(b => (
                                                    <div key={b.title} className="p-4 bg-white border border-[#dcd8cf] space-y-2 transition-all hover:border-[#d45a43]"><h5 className="font-bold text-[14px]">{b.title}</h5><p className="text-[10px] opacity-40 italic">{b.desc}</p></div>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="border border-[#dcd8cf] bg-white overflow-hidden shadow-sm">
                                            <button onClick={() => setLabOpen(!labOpen)} className="w-full p-4 flex justify-between items-center text-[10px] font-bold tracking-[0.4em] uppercase"><span>Literary Lab / 档案室</span><span>{labOpen ? '[-]' : '[+]'}</span></button>
                                            {labOpen && (
                                                <div className="p-6 pt-0 space-y-6 animate-fade-in border-t border-[#dcd8cf] bg-[#fcfbf9]/50">
                                                    <div className="grid gap-6 text-xs text-[#3a3833]">
                                                        <div><p className="font-bold text-[#d45a43] text-[9px] uppercase mb-2">所属流派</p><p className="leading-relaxed">{MOVEMENTS[result.movement].name}</p></div>
                                                        <div><p className="font-bold text-[#d45a43] text-[9px] uppercase mb-2">核心主张</p><p className="leading-relaxed">{MOVEMENTS[result.movement].core}</p></div>
                                                        <div><p className="font-bold text-[#d45a43] text-[9px] uppercase mb-2">常见批评</p><p className="italic opacity-60 leading-relaxed">{MOVEMENTS[result.movement].criticism}</p></div>
                                                        <div className="p-4 bg-[#f4f1ea] border-l-2 border-[#d45a43]">
                                                            <p className="text-[10px] font-bold mb-2 uppercase">与你的关联</p>
                                                            <p className="text-[11px] leading-relaxed opacity-80">{MOVEMENTS[result.movement].link}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="w-full h-8 flex mt-4 opacity-50">{[PALETTE.green, PALETTE.blue, PALETTE.teal, PALETTE.lavender, PALETTE.yellow].map(c => <div key={c} className="flex-1" style={{ backgroundColor: c }}></div>)}</div>
                                        <div className="text-[8px] opacity-20 tracking-[0.4em] text-center font-bold text-[#3a3833]">POSÉRIAL SPIRITUAL EXPERIMENT 2026 / REF-#{refId}</div>
                                    </DeckledPaper>
                                </div>

                                {tooltip && <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[60] bg-[#3a3833] text-white p-5 text-xs max-w-[280px] shadow-2xl border-b-4 border-[#d45a43] animate-fade-in leading-relaxed">{tooltip}</div>}

                                <div className="px-8 space-y-4">
                                    <button onClick={saveReport} disabled={isSaving} className="w-full py-5 bg-[#3a3833] text-[#f4f1ea] text-[11px] tracking-[0.6em] font-bold shadow-xl uppercase transition-all hover:bg-black disabled:opacity-50">{isSaving ? "GENERATING..." : "保存灵魂手稿报告"}</button>
                                    <button onClick={() => window.location.reload()} className="w-full py-4 border-2 border-[#3a3833] text-[10px] tracking-[0.5em] font-bold uppercase transition-all hover:bg-[#3a3833] hover:text-white">重新重塑原型</button>
                                </div>
                            </div>
                        )}
                    </div>

                    <style>{`
                        .animate-fade-in { animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
                        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
                        .keyword { border-bottom: 1.5 dashed #d45a43; cursor: help; color: #d45a43; font-weight: bold; }
                        body { -webkit-font-smoothing: antialiased; }
                        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
                    `}</style>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
